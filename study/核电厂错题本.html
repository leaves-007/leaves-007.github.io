/* === ExamPass Shared Styles === */
/* Paper-like warm background, clean typography, responsive */

:root {
  --paper: #fdf6e3;
  --paper-dark: #f5ecd7;
  --ink: #2c2c2c;
  --ink-light: #555;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --divider: #d6c8a8;
  --card-bg: #fef9ef;
  --card-border: #e8dcc8;
  --correct: #22c55e;
  --correct-bg: #f0fdf4;
  --wrong: #ef4444;
  --wrong-bg: #fef2f2;
  --tag-bg: #fef3c7;
  --tag-text: #92400e;
  --radius: 6px;
}

* { box-sizing: border-box; }

body {
  font-family: "Microsoft YaHei", "Noto Sans SC", "SimSun", sans-serif;
  font-size: 12pt; line-height: 1.75; color: var(--ink);
  max-width: 860px; margin: auto; padding: 24px 20px 60px;
  background: var(--paper);
}

@media print {
  body { font-size: 10.5pt; background: #fff; }
  .no-print { display: none !important; }
  h1, h2, h3 { page-break-after: avoid; }
}

/* ── Header ── */
#exampass-header {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 6px 0; margin-bottom: 0;
}
.header-brand { font-size: 1.2em; font-weight: 700; color: #1a1a2e; letter-spacing: 0.3px; }
.header-url  { font-size: 0.78em; color: #999; }
.header-divider { border: none; border-top: 2px solid var(--divider); margin: 4px 0 20px 0; }

/* ── Typography ── */
h1 { font-size: 1.55em; text-align: center; border-bottom: 2px solid var(--divider); padding-bottom: 8px; margin-top: 0; }
h2 { font-size: 1.25em; border-bottom: 1px solid var(--divider); padding-bottom: 4px; margin-top: 28px; }
h3 { font-size: 1.08em; margin-top: 20px; color: var(--ink); }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Tables ── */
table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 0.95em; }
td, th { border: 1px solid var(--card-border); padding: 5px 9px; text-align: left; }
th { background: var(--paper-dark); font-weight: 700; }

/* ── Knowledge point vs explanation ── */
.kp { font-weight: 700; color: var(--ink); }           /* key point: bold dark */
.exp { font-weight: 400; color: var(--ink-light); }    /* explanation: lighter */
.exp em, .exp strong { color: var(--ink); }             /* emphasis inside explanation */

/* ── Block elements ── */
blockquote {
  border-left: 3px solid #c0392b; background: #fef9ef;
  padding: 6px 14px; margin: 10px 0; font-size: 0.95em;
}
code { background: #f0ede0; padding: 2px 5px; border-radius: 3px; font-size: 0.92em; }
pre { background: #f0ede0; padding: 10px; border-radius: var(--radius); overflow-x: auto; }

/* ── TOC ── */
div.toc {
  background: var(--card-bg); padding: 14px 18px;
  border: 1px solid var(--card-border); border-radius: var(--radius); margin-bottom: 22px;
}
div.toc ul { padding-left: 18px; }
div.toc li { margin: 3px 0; font-size: 0.95em; }

/* ── Priority tags ── */
.tag-must   { background: #fee2e2; color: #991b1b; padding: 1px 6px; border-radius: 3px; font-size: 0.82em; font-weight: 600; }
.tag-key    { background: #fef3c7; color: #92400e; padding: 1px 6px; border-radius: 3px; font-size: 0.82em; font-weight: 600; }
.tag-freq   { background: #dbeafe; color: #1e40af; padding: 1px 6px; border-radius: 3px; font-size: 0.82em; font-weight: 600; }
.tag-info   { background: #f0fdf4; color: #166534; padding: 1px 6px; border-radius: 3px; font-size: 0.82em; font-weight: 600; }

/* === Interactive Test Styles === */

/* ── Score box ── */
#score-box {
  display: none; background: var(--paper-dark); color: var(--ink);
  padding: 16px 20px; border-radius: var(--radius); margin: 14px 0;
  text-align: center; border: 1px solid var(--card-border);
}
#score-box .score-num { font-size: 2.2em; font-weight: 700; }
#score-box .score-label { font-size: 0.85em; color: var(--ink-light); }

/* ── Question card ── */
.q-card {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 12px 14px; margin: 10px 0;
  transition: all 0.15s;
}
.q-card.correct { border-left: 3px solid var(--correct); background: #f7fdf4; }
.q-card.wrong   { border-left: 3px solid var(--wrong); background: #fef9f9; }

.q-num  { font-weight: 700; font-size: 0.98em; margin-bottom: 4px; }
.q-text { margin-bottom: 8px; font-size: 0.98em; }

/* ── Options (compact) ── */
.option {
  display: block; padding: 4px 10px; margin: 3px 0;
  border: 1px solid var(--card-border); border-radius: 4px;
  cursor: pointer; transition: all 0.12s; font-size: 0.93em;
  background: #fefcf5;
}
.option:hover            { background: #f0ede0; }
.option input            { margin-right: 6px; }
.option.selected         { border-color: var(--accent); background: #eff6ff; }
.option.correct-answer   { border-color: var(--correct); background: var(--correct-bg); }
.option.wrong-answer     { border-color: var(--wrong); background: var(--wrong-bg); }

/* ── Textareas (compact) ── */
.q-textarea {
  width: 100%; min-height: 56px; border: 1px solid var(--card-border);
  border-radius: 4px; padding: 6px 10px; font-family: inherit;
  font-size: 0.93em; background: #fefcf5; resize: vertical;
}
.q-textarea:focus { outline: none; border-color: var(--accent); }

/* ── Result after grading ── */
.result {
  display: none; margin-top: 8px; padding: 8px 12px;
  background: #fefcf5; border: 1px solid var(--card-border);
  border-radius: 4px; font-size: 0.9em; line-height: 1.6;
}
.result .badge {
  display: inline-block; padding: 1px 9px; border-radius: 3px;
  font-weight: 700; font-size: 0.82em; margin-right: 6px;
}
.badge-ok  { background: var(--correct-bg); color: #166534; }
.badge-no  { background: var(--wrong-bg); color: #991b1b; }
.badge-ref { background: #dbeafe; color: #1e40af; }

.result .explanation { margin-top: 4px; color: var(--ink); }
.result .pitfall { color: #b45309; margin-top: 3px; font-size: 0.9em; }

/* ── Grading button ── */
.grading-bar { text-align: center; margin: 20px 0; }
.grading-bar button {
  font-size: 1em; padding: 8px 32px; background: var(--accent);
  color: #fff; border: none; border-radius: var(--radius);
  cursor: pointer; font-weight: 600; letter-spacing: 0.3px;
}
.grading-bar button:hover     { background: var(--accent-hover); }
.grading-bar button:disabled  { background: #bbb; cursor: not-allowed; }


.quiz-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  justify-content: center;
  margin: 18px 0;
}
.quiz-toolbar button {
  font-size: 0.95em;
  padding: 8px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--card-border);
  background: #fffdf5;
  cursor: pointer;
}
.quiz-toolbar button.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.quiz-toolbar button.primary:hover {
  background: var(--accent-hover);
}
.quiz-toolbar button:hover {
  background: #f2efe4;

.quiz-meta {

nswers": [], "answer_text": "言之有理即可", "explanation": "", "missing_reference": false, "sources": ["核电厂系统与设备【总】(1).docx#论述题-2", "核电厂系统与设备【总】(1).docx#论述题-3", "核电厂系统与设备题库（2023.5牛逼版）.docx#论述题-8", "核电厂题库 (2).docx#论述题-3"], "points": 1, "dedup_key": "essay::你在使用pctran程序模拟蒸汽发生器传热管破裂事故的时候有哪里不理解或是觉得困难的地方::", "focus_assignment": {"chapter": "第二章 一回路与反应堆主要设备", "topic": "蒸汽发生器", "score": 2}}, {"id": "essay-f68fceaa2984", "type": "essay", "question": "冷却剂是如何流过堆芯的？", "options": [], "answers": [], "answer_text": "", "explanation": "", "missing_reference": true, "sources": ["核电厂系统与设备【总】(1).docx#论述题-2", "核电厂系统与设备【总】(1).docx#论述题-4", "核电厂系统与设备题库（2023.5牛逼版）.docx#论述题-4", "核电厂题库 (2).docx#论述题-4"], "points": 1, "dedup_key": "essay::冷却剂是如何流过堆芯的::"}, {"id": "essay-6209ed7a3736", "type": "essay", "question": "根据本课程的学习和自己的认识，谈谈与火电机组相比，核电站的优势与不足之处。", "options": [], "answers": [], "answer_text": "此题为开放性题，只要言之有理，都可以酌情给分。\n火力发电 优点:成本低，技术成熟，资源广泛，占现在电厂的70%~80%。缺点:污染环境，消耗一次能源，没有什么发展钱途了，以后可能会慢慢被新能源取代。\n核能发电 优点:不消耗一次能源，很有发展钱途，缺点:核电相对技术不是太成熟，电厂一般位置会很偏，核泄漏会造成核辐射，成本较火电高。", "explanation": "", "missing_reference": false, "sources": ["核电厂系统与设备【总】(1).docx#论述题-1", "核电厂系统与设备【总】(1).docx#论述题-2", "核电厂系统与设备【总】(1).docx#论述题-3", "核电厂系统与设备【总】(1).docx#论述题-5", "核电厂系统与设备【总】(1).docx#论述题-6", "核电厂系统与设备题库（2023.5牛逼版）.docx#论述题-2", "核电厂系统与设备题库（2023.5牛逼版）.docx#论述题-5", "核电厂题库 (2).docx#论述题-1", "核电厂题库 (2).docx#论述题-2", "核电厂题库 (2).docx#论述题-3", "核电厂题库 (2).docx#论述题-6"], "points": 1, "dedup_key": "essay::根据本课程的学习和自己的认识谈谈与火电机组相比核电站的优势与不足之处::"}, {"id": "essay-96309eba6eb2", "type": "essay", "question": "根据本课程的学习和自己的认识，谈谈与火电机组相比，核电站的优势与不足之处。 （10 分）", "options": [], "answers": [], "answer_text": "此题为开放性题，只要言之有理，都可以酌情给分。", "explanation": "", "missing_reference": false, "sources": ["2018级核电厂考试试卷.docx#论述题-1"], "points": 1, "dedup_key": "essay::根据本课程的学习和自己的认识谈谈与火电机组相比核电站的优势与不足之处10分::"}, {"id": "essay-baa09965dcf5", "type": "essay", "question": "根据本课程的学习和自己的认识，谈谈未来核电发展可以在哪些方面提高安全性。", "options": [], "answers": [], "answer_text": "（1）安全第一，建立全面的安全管理体系\n从选址、设计、建造到目前的日常运营，核电站自始至终坚持把安全放在第一位，遵循一套完整的原则、准则和标准，通过完善的技术措施和严格的管理制度，确保电站的安全稳定运行。\n（2）纵深防御，实现多重保护\n为确保安全，保护电站工作人员和电站周围居民的健康，核电站的设计、建造和运行均遵循“纵深防御，多重保护和多样性”的原则，以预防事故发生，限制可能发生事故的后果。\n安全系数:重要工艺参数和设备尺寸都留有充分的裕度，具有相足够的安全系数。\n反应堆停堆保护:反应堆运行一旦出现异常，快速停堆系统立即起作用，安全控制棒靠重力快速降落，反应堆停堆以达成保护目的。\n设计冗余:关键的控制系统和仪器仪表都同时有两套或两套以上，一旦一套发生故障，另一套立即自动投入运行。\n专设安全设施:一旦发生事故，完善的专设安全设施自动投入运行，从各方面限制事故的发展。\n第一道防线:精心设计，精心施工，确保核电站的设备精良。建立周密的程序，严格的制度和必要的监督，加强对核电站工作人员的教育和培养，使得人人关心安全，人人注意安全，防止发生故障。\n第二道防线:加强运行管理和监督，及时正确处理不正常情况，排除故障。\n第三道防线:必要时启动由设计提供的安全系统和保护系统，防止设备故障和人为差错酿成事故。\n第四道防线:启用核电站安全系统，加强事故中的电站管理，防止事故扩大，保护安全壳厂房。\n第五道防线:万一发生极不可能发生的事故，并且有放射性外泄，用厂内外应急响应计划，努力减少事故对环境和居民的影响。\n（3）核电站应急措施保障\n在核电站选址的过程中，综合考虑了周边公众的安全。在厂址确定后，针对可能受到的影响，核电站的周边划分有5公里、10公里等不同的应急区域。在核电站建设和运营过程中，根据国家规定，必须建立完备的应急计划、应急设备和应急体系，并进行定期的应急演习，确保核电站在可能发生事故时周边群众能及时安全地得到转移。\n此题为开放性题，只要言之有理，都可以酌情给分。", "explanation": "", "missing_reference": false, "sources": ["核电厂系统与设备【总】(1).docx#论述题-1", "核电厂系统与设备【总】(1).docx#论述题-5", "核电厂系统与设备题库（2023.5牛逼版）.docx#论述题-1", "核电厂题库 (2).docx#论述题-1", "核电厂题库 (2).docx#论述题-5"], "points": 1, "dedup_key": "essay::根据本课程的学习和自己的认识谈谈未来核电发展可以在哪些方面提高安全性::"}, {"id": "essay-6fb17dd0f9f7", "type": "essay", "question": "观看视频核电典型人物“守护核电安全的大国工匠——乔素凯”后，你有何感想？对你的工作和学习有怎样的启发呢？\n守护核电安全的大国工匠 乔素凯.mp4", "options": [], "answers": [], "answer_text": "只要言之有理即可。\n“热爱祖国、无私奉献、自力更生、艰苦奋斗、大力协同、勇于攀登”的两弹一星精神；\n“事业高于一切、责任重于一切、严细融于一切、进取成就一切”的核工业精神。\n精益求精、传心传世的核工业精神。", "explanation": "", "missing_reference": false, "sources": ["核电厂系统与设备【总】(1).docx#论述题-5", "核电厂系统与设备【总】(1).docx#论述题-7", "核电厂系统与设备题库（2023.5牛逼版）.docx#论述题-6", "核电厂题库 (2).docx#论述题-7"], "points": 1, "dedup_key": "essay::观看视频核电典型人物守护核电安全的大国工匠——乔素凯后你有何感想对你的工作和学习有怎样的启发呢守护核电安全的大国工匠乔素凯mp4::"}];

    return;
  }
  loading.classList.toggle('is-hidden', !visible);

  var titleEl = document.getElementById('quiz-loading-title');
  if (titleEl && title) {
    titleEl.textContent = title;
  }

  var progressEl = document.getElementById('quiz-loading-progress');
  if (progressEl && progress) {
    progressEl.textContent = progress;
  }
}

function scheduleNextFrame(callback) {
  if (window.requestAnimationFrame) {
    window.requestAnimationFrame(callback);
    return;
  }
  setTimeout(callback, 0);
}

function getVisibleQuestionIds() {
  var cards = document.querySelectorAll('.q-card[data-qid]');
  var ids = [];
  for (var i = 0; i < cards.length; i++) {
    ids.push(cards[i].getAttribute('data-qid'));
  }
  return ids;
}

function getActiveQuestions() {
  if (PAGE_MODE !== 'wrongbook') {
    return Q;
  }

  var visibleIds = progressState && Array.isArray(progressState.visibleQuestionIds)
    ? progressState.visibleQuestionIds
    : null;

  if (visibleIds && visibleIds.length) {
    var byId = {};
    for (var i = 0; i < Q.length; i++) {
      byId[Q[i].id] = Q[i];
    }
    var restored = [];
    for (var j = 0; j < visibleIds.length; j++) {
      if (byId[visibleIds[j]]) {
        restored.push(byId[visibleIds[j]]);
      }
    }
    if (restored.length) {
      return restored;
    }
  }

  var activeQuestions = [];
  for (var x = 0; x < Q.length; x++) {
    if (wrongbook[Q[x].id]) {
      activeQuestions.push(Q[x]);
    }
  }
  return activeQuestions;
}

function areInputsDisabled() {
  var input = document.querySelector('#questions-container input');
  if (input) {
    return !!input.disabled;
  }
  var textarea = document.querySelector('#questions-container textarea');
  return textarea ? !!textarea.disabled : false;
}

function setInputsDisabled(disabled) {
  var inputs = document.querySelectorAll('#questions-container input');
  for (var i = 0; i < inputs.length; i++) {
    inputs[i].disabled = disabled;
  }
  var textareas = document.querySelectorAll('.q-textarea');
  for (var j = 0; j < textareas.length; j++) {
    textareas[j].disabled = disabled;
  }
}

function captureProgressState() {
  var state = {
    filterFavoritesOnly: filterFavoritesOnly,
    visibleQuestionIds: getVisibleQuestionIds(),
    inputsDisabled: areInputsDisabled(),
    scrollY: window.pageYOffset || window.scrollY || 0,
    scoreBox: {
      visible: false,
      scoreNum: '',
      scoreDetail: ''
    },
    questions: {}
  };

  var scoreBox = document.getElementById('score-box');
  if (scoreBox) {
    state.scoreBox.visible = scoreBox.style.display === 'block';
    var scoreNum = document.getElementById('score-num');
    var scoreDetail = document.getElementById('score-detail');
    state.scoreBox.scoreNum = scoreNum ? scoreNum.textContent : '';
    state.scoreBox.scoreDetail = scoreDetail ? scoreDetail.textContent : '';
  }

  var cards = document.querySelectorAll('.q-card[data-qid]');
  for (var i = 0; i < cards.length; i++) {
    var card = cards[i];
    var qid = card.getAttribute('data-qid');
    var stateItem = {
      cardClassName: card.className,
      checkedValues: [],
      textValue: '',
      resultVisible: false,
      badgeClassName: '',
      badgeText: '',
      answerText: '',
      sourceOpen: false,
      optionClassNames: {}
    };

    var checked = document.querySelectorAll('input[name="' + qid + '"]:checked');
    for (var j = 0; j < checked.length; j++) {
      stateItem.checkedValues.push(checked[j].value);
    }

    var textarea = document.getElementById('text-' + qid);
    if (textarea) {
      stateItem.textValue = textarea.value;
    }

    var labels = card.querySelectorAll('.option');
    for (var k = 0; k < labels.length; k++) {
      if (labels[k].id) {
        stateItem.optionClassNames[labels[k].id] = labels[k].className;
      }
    }

    var result = document.getElementById('result-' + qid);
    if (result) {
      stateItem.resultVisible = result.style.display === 'block';
    }

    var badge = document.getElementById('badge-' + qid);
    if (badge) {
      stateItem.badgeClassName = badge.className;
      stateItem.badgeText = badge.textContent;
    }

    var answer = document.getElementById('answer-' + qid);
    if (answer) {
      stateItem.answerText = answer.textContent;
    }

    var source = document.getElementById('src-' + qid);
    if (source) {
      stateItem.sourceOpen = !!source.open;
    }

    state.questions[qid] = stateItem;
  }

  return state;
}

function restoreProgressState() {
  if (!progressState || !progressState.questions) {
    return;
  }

  filterFavoritesOnly = !!progressState.filterFavoritesOnly;

  var questionStates = progressState.questions || {};
  var ids = Object.keys(questionStates);
  for (var i = 0; i < ids.length; i++) {
    var qid = ids[i];
    var item = questionStates[qid];
    var card = document.getElementById('card-' + qid);
    if (!card || !item) {
      continue;
    }

    if (item.cardClassName) {
      card.className = item.cardClassName;
    }

    var inputs = document.querySelectorAll('input[name="' + qid + '"]');
    for (var j = 0; j < inputs.length; j++) {
      inputs[j].checked = item.checkedValues.indexOf(inputs[j].value) !== -1;
    }

    var textarea = document.getElementById('text-' + qid);
    if (textarea && typeof item.textValue === 'string') {
      textarea.value = item.textValue;
    }

    var optionIds = Object.keys(item.optionClassNames || {});
    for (var k = 0; k < optionIds.length; k++) {
      var optionEl = document.getElementById(optionIds[k]);
      if (optionEl) {
        optionEl.className = item.optionClassNames[optionIds[k]];
      }
    }

    var result = document.getElementById('result-' + qid);
    if (result) {
      result.style.display = item.resultVisible ? 'block' : 'none';
    }

    var badge = document.getElementById('badge-' + qid);
    if (badge) {
      badge.className = item.badgeClassName || 'badge';
      badge.textContent = item.badgeText || '';
    }

    var answer = document.getElementById('answer-' + qid);
    if (answer) {
      answer.textContent = item.answerText || '';
    }

    var source = document.getElementById('src-' + qid);
    if (source) {
      source.open = !!item.sourceOpen;
    }
  }

  applyFavoritesFilter();
  setInputsDisabled(!!progressState.inputsDisabled);

  var scoreBox = document.getElementById('score-box');
  if (scoreBox) {
    scoreBox.style.display = progressState.scoreBox && progressState.scoreBox.visible ? 'block' : 'none';
  }
  var scoreNum = document.getElementById('score-num');
  if (scoreNum && progressState.scoreBox) {
    scoreNum.textContent = progressState.scoreBox.scoreNum || '0 / 0';
  }
  var scoreDetail = document.getElementById('score-detail');
  if (scoreDetail && progressState.scoreBox) {
    scoreDetail.textContent = progressState.scoreBox.scoreDetail || '';
  }

  if (typeof progressState.scrollY === 'number') {
    var top = progressState.scrollY;
    setTimeout(function() {
      window.scrollTo(0, top);
    }, 0);
  }
}

function attachWindowProgressListeners() {
  if (windowProgressListenersAttached) {
    return;
  }
  windowProgressListenersAttached = true;

  window.addEventListener('scroll', function() {
    scheduleScrollSave();
  }, { passive: true });

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      flushProgressSave();
    }
  });
}

function attachProgressListeners() {
  var inputs = document.querySelectorAll('#questions-container input');
  for (var i = 0; i < inputs.length; i++) {
    inputs[i].addEventListener('change', scheduleProgressSave);
  }

  var textareas = document.querySelectorAll('.q-textarea');
  for (var j = 0; j < textareas.length; j++) {
    textareas[j].addEventListener('input', scheduleProgressSave);
  }

  var details = document.querySelectorAll('#questions-container details.q-source');
  for (var k = 0; k < details.length; k++) {
    details[k].addEventListener('toggle', scheduleProgressSave);
  }

  attachWindowProgressListeners();
}

function summarizeWrongbookQuestion(text) {
  return String(text || '')
    .replace(/\s+/g, ' ')
    .trim()
    .slice(0, 72);
}

function build() {
  var container = document.getElementById('questions-container');
  if (!container) {
    return;
  }

  renderTaskToken += 1;
  var taskToken = renderTaskToken;
  var activeQuestions = getActiveQuestions();
  var total = activeQuestions.length;

  container.innerHTML = '';
  container.setAttribute('aria-busy', 'true');
  setLoadingState(true, '正在加载题库...', '准备题目数据...');

  if (PAGE_MODE === 'wrongbook' && !activeQuestions.length) {
    container.innerHTML = '<div class="wrongbook-empty">当前错题本为空。返回总题页做题后，自动判错或手动收藏的题目会出现在这里。</div>';
    refreshWrongbookPanel();
    container.removeAttribute('aria-busy');
    setLoadingState(false);
    return;
  }

  var currentSection = '';
  var index = 0;
  var chunkSize = 36;

  function finishBuild() {
    if (taskToken !== renderTaskToken) {
      return;
    }

    applyFavoritesFilter();
    refreshWrongbookPanel();
    setLoadingState(true, '正在恢复做题进度...', '正在应用本地缓存...');
    restoreProgressState();
    attachProgressListeners();
    container.removeAttribute('aria-busy');

    if (window.MathJax && MathJax.typesetPromise) {
      setLoadingState(true, '正在恢复做题进度...', '正在排版公式...');
      MathJax.typesetPromise([container]).catch(function(err) {
        console.error('MathJax typeset error:', err);
      }).finally(function() {
        setLoadingState(false);
        saveProgress();
      });
      return;
    }

    setLoadingState(false);
    saveProgress();
  }

  function renderChunk() {
    if (taskToken !== renderTaskToken) {
      return;
    }

    var end = Math.min(index + chunkSize, total);
    var chunkHtml = '';

    for (; index < end; index++) {
      var q = activeQuestions[index];
      if (q.type !== currentSection) {
        currentSection = q.type;
        chunkHtml += '<h2 id="section-' + currentSection + '">' + SECTION_LABELS[currentSection] + '</h2>';
      }
      chunkHtml += renderQuestion(q, index);
    }

    container.insertAdjacentHTML('beforeend', chunkHtml);
    setLoadingState(true, '正在渲染题目...', '已加载 ' + end + ' / ' + total + ' 题');

    if (end < total) {
      scheduleNextFrame(renderChunk);
      return;
    }

    finishBuild();
  }

  scheduleNextFrame(renderChunk);
}

function renderQuestion(q, index) {
  var card = '';
  var cardClass = q.missing_reference ? 'q-card missing-reference' : 'q-card';
  card += '<div class="' + cardClass + '" id="card-' + q.id + '" data-qid="' + q.id + '">';
  card += '<div class="q-num">' + (index + 1) + '. (' + q.points + ' 分)</div>';
  if (q.missing_reference) {
    card += '<div class="missing-reference-flag">无参考答案</div>';
  }
  card += '<div class="q-text">' + toHtml(q.question) + '</div>';

  if (q.type === 'choice') {
    for (var i = 0; i < q.options.length; i++) {
      card += renderOption(q, i, false);
    }
  } else if (q.type === 'multi') {
    for (var j = 0; j < q.options.length; j++) {
      card += renderOption(q, j, true);
    }
  } else if (q.type === 'tf') {
    var options = ['对', '错'];
    for (var k = 0; k < options.length; k++) {
      card += renderTfOption(q, k, options[k]);
    }
  } else {
    card += '<textarea class="q-textarea" id="text-' + q.id + '" rows="3" placeholder="在此作答..."></textarea>';
  }

  card += '<div class="card-tools">';
  card += '<button type="button" id="fav-' + q.id + '" onclick="toggleFavorite(\'' + q.id + '\')">' + favoriteButtonText(q.id) + '</button>';
  card += '<button type="button" onclick="toggleSources(\'' + q.id + '\')">来源</button>';
  card += '</div>';
  card += '<div class="result" id="result-' + q.id + '">';
  card += '<span class="badge" id="badge-' + q.id + '"></span>';
  card += '<span class="objective-answer" id="answer-' + q.id + '"></span>';
  card += '<div class="explanation">' + toHtml(q.explanation || q.answer_text || '暂无解析') + '</div>';
  card += '</div>';
  card += '<details class="q-source" id="src-' + q.id + '"><summary>查看来源</summary><div>' + toHtml((q.sources || []).join('\n')) + '</div></details>';
  card += '</div>';
  return card;
}

function renderOption(q, optionIndex, isCheckbox) {
  var inputType = isCheckbox ? 'checkbox' : 'radio';
  var optionId = 'opt-' + q.id + '-' + optionIndex;
  var letter = String.fromCharCode(65 + optionIndex);
  return ''
    + '<label class="option" id="' + optionId + '">'
    + '<span class="option-inline">'
    + '<input type="' + inputType + '" name="' + q.id + '" value="' + letter + '">'
    + '<span>' + letter + '. ' + toHtml(q.options[optionIndex]) + '</span>'
    + '</span>'
    + '</label>';
}

function renderTfOption(q, optionIndex, label) {
  var optionId = 'opt-' + q.id + '-' + optionIndex;
  return ''
    + '<label class="option" id="' + optionId + '">'
    + '<span class="option-inline">'
    + '<input type="radio" name="' + q.id + '" value="' + label + '">'
    + '<span>' + escapeHtml(label) + '</span>'
    + '</span>'
    + '</label>';
}

function favoriteButtonText(qid) {
  return wrongbook[qid] ? '取消收藏' : '收藏错题';
}

function toggleFavorite(qid) {
  var preservedState = null;
  if (PAGE_MODE === 'wrongbook') {
    preservedState = captureProgressState();
  }

  if (wrongbook[qid]) {
    delete wrongbook[qid];
  } else {
    wrongbook[qid] = snapshotQuestion(qid, 'manual');
  }
  var button = document.getElementById('fav-' + qid);
  if (button) {
    button.textContent = favoriteButtonText(qid);
    button.classList.toggle('active', !!wrongbook[qid]);
  }

  if (PAGE_MODE === 'wrongbook' && preservedState) {
    delete preservedState.questions[qid];
    preservedState.visibleQuestionIds = (preservedState.visibleQuestionIds || []).filter(function(id) {
      return id !== qid;
    });
    progressState = preservedState;
  }

  saveWrongbook();
  if (PAGE_MODE === 'wrongbook') {
    build();
    saveProgress();
    return;
  }
  applyFavoritesFilter();
  saveProgress();
}

function toggleSources(qid) {
  var details = document.getElementById('src-' + qid);
  if (details) {
    details.open = !details.open;
    saveProgress();
  }
}

function snapshotQuestion(qid, reason) {
  for (var i = 0; i < Q.length; i++) {
    if (Q[i].id === qid) {
      return {
        id: qid,
        question: Q[i].question,
        type: Q[i].type,
        reason: reason,
        savedAt: new Date().toISOString()
      };
    }
  }
  return { id: qid, reason: reason, savedAt: new Date().toISOString() };
}

function normalizeText(text) {
  return String(text || '')
    .toLowerCase()
    .replace(/[\s\u00a0]+/g, '')
    .replace(/[，,；;、。．\.：:！!？?（）()【】\[\]“”"']/g, '');
}

function getSelectedValues(qid) {
  var inputs = document.querySelectorAll('input[name="' + qid + '"]:checked');
  var values = [];
  for (var i = 0; i < inputs.length; i++) {
    values.push(inputs[i].value);
  }
  values.sort();
  return values;
}

function isFillCorrect(userText, answers) {
  var expected = (answers || []).map(normalizeText).filter(Boolean);
  if (!expected.length) {
    return false;
  }
  var normalizedInput = normalizeText(userText);
  if (expected.length === 1) {
    return normalizedInput.indexOf(expected[0]) !== -1;
  }
  var pieces = String(userText || '')
    .split(/[\n,，;；、]/)
    .map(normalizeText)
    .filter(Boolean);
  for (var i = 0; i < expected.length; i++) {
    if (normalizedInput.indexOf(expected[i]) === -1 && pieces.indexOf(expected[i]) === -1) {
      return false;
    }
  }
  return true;
}

function markOptionState(qid, values, answers) {
  var all = document.querySelectorAll('input[name="' + qid + '"]');
  var selectedMap = {};
  for (var i = 0; i < values.length; i++) {
    selectedMap[values[i]] = true;
  }
  var answerMap = {};
  for (var j = 0; j < answers.length; j++) {
    answerMap[answers[j]] = true;
  }
  for (var k = 0; k < all.length; k++) {
    var input = all[k];
    var label = input.closest('.option');
    if (!label) {
      continue;
    }
    label.classList.remove('selected', 'correct-answer', 'wrong-answer');
    if (selectedMap[input.value]) {
      label.classList.add('selected');
    }
    if (answerMap[input.value]) {
      label.classList.add('correct-answer');
    } else if (selectedMap[input.value]) {
      label.classList.add('wrong-answer');
    }
  }
}

function gradeAll() {
  var score = 0;
  var maxScore = 0;
  var autoCount = 0;
  var correctCount = 0;

  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    var result = document.getElementById('result-' + q.id);
    var badge = document.getElementById('badge-' + q.id);
    var answer = document.getElementById('answer-' + q.id);
    var card = document.getElementById('card-' + q.id);
    if (!result || !badge || !answer || !card) {
      continue;
    }
    result.style.display = 'block';
    card.classList.remove('correct', 'wrong');

    if (q.type === 'choice' || q.type === 'multi' || q.type === 'tf' || q.type === 'fill') {
      autoCount += 1;
      maxScore += q.points;
      var passed = false;

      if (q.type === 'fill') {
        var userText = document.getElementById('text-' + q.id).value;
        passed = isFillCorrect(userText, q.answers);
      } else {
        var picked = getSelectedValues(q.id);
        var expected = (q.answers || []).slice().sort();
        passed = JSON.stringify(picked) === JSON.stringify(expected);
        markOptionState(q.id, picked, expected);
      }

      if (passed) {
        score += q.points;
        correctCount += 1;
        badge.className = 'badge badge-ok';
        badge.textContent = '正确';
        card.classList.add('correct');
        answer.textContent = '';
        delete wrongbook[q.id];
      } else {
        badge.className = 'badge badge-no';
        badge.textContent = '错误';
        card.classList.add('wrong');
        answer.textContent = '正确答案：' + (q.answer_text || (q.answers || []).join('、'));
        wrongbook[q.id] = snapshotQuestion(q.id, 'auto');
      }
    } else {
      badge.className = 'badge badge-ref';
      badge.textContent = '参考答案';
      answer.textContent = q.answer_text ? '参考答案：' + q.answer_text : '开放题，参考来源答案。';
    }

    var button = document.getElementById('fav-' + q.id);
    if (button) {
      button.textContent = favoriteButtonText(q.id);
      button.classList.toggle('active', !!wrongbook[q.id]);
    }
  }

  saveWrongbook();

  var scoreBox = document.getElementById('score-box');
  if (scoreBox) {
    scoreBox.style.display = 'block';
    document.getElementById('score-num').textContent = score + ' / ' + maxScore;
    document.getElementById('score-detail').textContent = '自动判分题：' + autoCount + '，答对：' + correctCount + '。主观题请自行对照参考答案。';
    scoreBox.scrollIntoView({ behavior: 'smooth' });
  }

  var textareas = document.querySelectorAll('.q-textarea');
  for (var t = 0; t < textareas.length; t++) {
    textareas[t].disabled = true;
  }
  var inputs = document.querySelectorAll('#questions-container input');
  for (var p = 0; p < inputs.length; p++) {
    inputs[p].disabled = true;
  }

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise().catch(function(err) {
      console.error('MathJax typeset error:', err);
    });
  }

  saveProgress();
}

function updateWrongbookPanel() {
  var countEl = document.getElementById('wrongbook-count');
  var listEl = document.getElementById('wrongbook-list');
  var statEl = document.getElementById('wrongbook-stat-count');
  var sectionCountEl = document.getElementById('wrongbook-section-count');
  var sectionListEl = document.getElementById('wrongbook-section-list');
  if (!countEl || !listEl) {
    return;
  }
  var ids = Object.keys(wrongbook);
  countEl.textContent = String(ids.length);
  if (statEl) {
    statEl.textContent = String(ids.length);
  }
  if (sectionCountEl) {
    sectionCountEl.textContent = String(ids.length);
  }
  if (!ids.length) {
    listEl.innerHTML = '<span>当前没有收藏错题。</span>';
    if (sectionListEl) {
      sectionListEl.innerHTML = '<div class="wrongbook-empty">当前错题本为空。自动判分答错或手动收藏后会出现在这里。</div>';
    }
    return;
  }
  var html = '';
  var sectionHtml = '';
  for (var i = 0; i < ids.length; i++) {
    var snapshot = wrongbook[ids[i]] || { id: ids[i] };
    var sectionLabel = SECTION_LABELS[snapshot.type] || snapshot.type || '题目';
    var summary = summarizeWrongbookQuestion(snapshot.question || ids[i]);
    html += '<a href="#card-' + ids[i] + '">' + escapeHtml(ids[i]) + '</a>';
    sectionHtml += ''
      + '<div class="wrongbook-entry">'
      + '<div class="wrongbook-entry-meta">' + escapeHtml(sectionLabel) + '</div>'
      + '<a class="wrongbook-entry-link" href="#card-' + ids[i] + '">' + escapeHtml(summary || ids[i]) + '</a>'
      + '</div>';
  }
  listEl.innerHTML = html;
  if (sectionListEl) {
    sectionListEl.innerHTML = sectionHtml;
  }
}

function refreshWrongbookPanel() {
  var countEl = document.getElementById('wrongbook-count');
  var listEl = document.getElementById('wrongbook-list');
  var statEl = document.getElementById('wrongbook-stat-count');
  var sectionCountEl = document.getElementById('wrongbook-section-count');
  var sectionListEl = document.getElementById('wrongbook-section-list');
  var ids = Object.keys(wrongbook);

  if (statEl) {
    statEl.textContent = String(ids.length);
  }
  if (sectionCountEl) {
    sectionCountEl.textContent = String(ids.length);
  }
  if (countEl) {
    countEl.textContent = String(ids.length);
  }

  if (!ids.length) {
    if (PAGE_MODE === 'wrongbook') {
      var container = document.getElementById('questions-container');
      if (container) {
        container.innerHTML = '<div class="wrongbook-empty">当前错题本为空。返回总题页做题后，自动判错或手动收藏的题目会出现在这里。</div>';
      }
    }
    if (listEl) {
      listEl.innerHTML = '<span>当前没有收藏错题。</span>';
    }
    if (sectionListEl) {
      sectionListEl.innerHTML = '<div class="wrongbook-empty">当前错题本为空。自动判错或手动收藏后会出现在这里。</div>';
    }
    return;
  }

  var html = '';
  var sectionHtml = '';
  for (var i = 0; i < ids.length; i++) {
    var snapshot = wrongbook[ids[i]] || { id: ids[i] };
    var sectionLabel = SECTION_LABELS[snapshot.type] || snapshot.type || '题目';
    var summary = summarizeWrongbookQuestion(snapshot.question || ids[i]);
    html += '<a href="#card-' + ids[i] + '">' + escapeHtml(ids[i]) + '</a>';
    sectionHtml += ''
      + '<div class="wrongbook-entry">'
      + '<div class="wrongbook-entry-meta">' + escapeHtml(sectionLabel) + '</div>'
      + '<a class="wrongbook-entry-link" href="#card-' + ids[i] + '">' + escapeHtml(summary || ids[i]) + '</a>'
      + '</div>';
  }
  if (listEl) {
    listEl.innerHTML = html;
  }
  if (sectionListEl) {
    sectionListEl.innerHTML = sectionHtml;
  }
}

function applyFavoritesFilter() {
  for (var i = 0; i < Q.length; i++) {
    var card = document.getElementById('card-' + Q[i].id);
    if (!card) {
      continue;
    }
    var hidden = filterFavoritesOnly && !wrongbook[Q[i].id];
    card.classList.toggle('hidden', hidden);
  }
}

function showFavoritesOnly() {
  filterFavoritesOnly = true;
  applyFavoritesFilter();
  saveProgress();
}

function showAllQuestions() {
  filterFavoritesOnly = false;
  applyFavoritesFilter();
  saveProgress();
}

function clearWrongbook() {
  wrongbook = {};
  saveWrongbook();
  var buttons = document.querySelectorAll('[id^="fav-"]');
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].textContent = '\u6536\u85cf\u9519\u9898';
    buttons[i].classList.remove('active');
  }
  applyFavoritesFilter();
  saveProgress();
}

function resetQuizProgress() {
  filterFavoritesOnly = false;
  clearProgress();
  build();
}

function resetPageState() {
  clearProgress();
  clearWrongbookState();
  window.location.reload();
}

window.addEventListener('beforeunload', function() {
  saveProgress();
});

if (document.readyState === 'interactive' || document.readyState === 'complete') {
  build();
} else {
  document.addEventListener('DOMContentLoaded', build);
}

</script>
</body>
</html>

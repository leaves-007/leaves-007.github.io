<style>
/* === ExamPass Shared Styles === */
/* Paper-like warm background, clean typography, responsive */

:root {
  --paper: #fdf6e3;
  --paper-dark: #f5ecd7;
  --ink: #2c2c2c;
  --ink-light: #555;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --divider: #d6c8a8;
  --card-bg: #fef9ef;
  --card-border: #e8dcc8;
  --correct: #22c55e;
  --correct-bg: #f0fdf4;
  --wrong: #ef4444;
  --wrong-bg: #fef2f2;
  --tag-bg: #fef3c7;
  --tag-text: #92400e;
  --radius: 6px;
}

* { box-sizing: border-box; }

body {
  font-family: "Microsoft YaHei", "Noto Sans SC", "SimSun", sans-serif;
  font-size: 12pt; line-height: 1.75; color: var(--ink);
  max-width: 860px; margin: auto; padding: 24px 20px 60px;
  background: var(--paper);
}

@media print {
  body { font-size: 10.5pt; background: #fff; }
  .no-print { display: none !important; }
  h1, h2, h3 { page-break-after: avoid; }
}

/* ── Header ── */
#exampass-header {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 6px 0; margin-bottom: 0;
}
.header-brand { font-size: 1.2em; font-weight: 700; color: #1a1a2e; letter-spacing: 0.3px; }
.header-url  { font-size: 0.78em; color: #999; }
.header-divider { border: none; border-top: 2px solid var(--divider); margin: 4px 0 20px 0; }

/* ── Typography ── */
h1 { font-size: 1.55em; text-align: center; border-bottom: 2px solid var(--divider); padding-bottom: 8px; margin-top: 0; }
h2 { font-size: 1.25em; border-bottom: 1px solid var(--divider); padding-bottom: 4px; margin-top: 28px; }
h3 { font-size: 1.08em; margin-top: 20px; color: var(--ink); }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Tables ── */
table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 0.95em; }
td, th { border: 1px solid var(--card-border); padding: 5px 9px; text-align: left; }
th { background: var(--paper-dark); font-weight: 700; }

/* ── Knowledge point vs explanation ── */
.kp { font-weight: 700; color: var(--ink); }           /* key point: bold dark */
.exp { font-weight: 400; color: var(--ink-light); }    /* explanation: lighter */
.exp em, .exp strong { color: var(--ink); }             /* emphasis inside explanation */

/* ── Block elements ── */
blockquote {
  border-left: 3px solid #c0392b; background: #fef9ef;
  padding: 6px 14px; margin: 10px 0; font-size: 0.95em;
}
code { background: #f0ede0; padding: 2px 5px; border-radius: 3px; font-size: 0.92em; }
pre { background: #f0ede0; padding: 10px; border-radius: var(--radius); overflow-x: auto; }

/* ── TOC ── */
div.toc {
  background: var(--card-bg); padding: 14px 18px;
  border: 1px solid var(--card-border); border-radius: var(--radius); margin-bottom: 22px;
}
div.toc ul { padding-left: 18px; }
div.toc li { margin: 3px 0; font-size: 0.95em; }

/* ── Priority tags ── */
.tag-must   { background: #fee2e2; color: #991b1b; padding: 1px 6px; border-radius: 3px; font-size: 0.82em; font-weight: 600; }
.tag-key    { background: #fef3c7; color: #92400e; padding: 1px 6px; border-radius: 3px; font-size: 0.82em; font-weight: 600; }
.tag-freq   { background: #dbeafe; color: #1e40af; padding: 1px 6px; border-radius: 3px; font-size: 0.82em; font-weight: 600; }
.tag-info   { background: #f0fdf4; color: #166534; padding: 1px 6px; border-radius: 3px; font-size: 0.82em; font-weight: 600; }

/* === Interactive Test Styles === */

/* ── Score box ── */
#score-box {
  display: none; background: var(--paper-dark); color: var(--ink);
  padding: 16px 20px; border-radius: var(--radius); margin: 14px 0;
  text-align: center; border: 1px solid var(--card-border);
}
#score-box .score-num { font-size: 2.2em; font-weight: 700; }
#score-box .score-label { font-size: 0.85em; color: var(--ink-light); }

/* ── Question card ── */
.q-card {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 12px 14px; margin: 10px 0;
  transition: all 0.15s;
}
.q-card.correct { border-left: 3px solid var(--correct); background: #f7fdf4; }
.q-card.wrong   { border-left: 3px solid var(--wrong); background: #fef9f9; }

.q-num  { font-weight: 700; font-size: 0.98em; margin-bottom: 4px; }
.q-text { margin-bottom: 8px; font-size: 0.98em; }

/* ── Options (compact) ── */
.option {
  display: block; padding: 4px 10px; margin: 3px 0;
  border: 1px solid var(--card-border); border-radius: 4px;
  cursor: pointer; transition: all 0.12s; font-size: 0.93em;
  background: #fefcf5;
}
.option:hover            { background: #f0ede0; }
.option input            { margin-right: 6px; }
.option.selected         { border-color: var(--accent); background: #eff6ff; }
.option.correct-answer   { border-color: var(--correct); background: var(--correct-bg); }
.option.wrong-answer     { border-color: var(--wrong); background: var(--wrong-bg); }

/* ── Textareas (compact) ── */
.q-textarea {
  width: 100%; min-height: 56px; border: 1px solid var(--card-border);
  border-radius: 4px; padding: 6px 10px; font-family: inherit;
  font-size: 0.93em; background: #fefcf5; resize: vertical;
}
.q-textarea:focus { outline: none; border-color: var(--accent); }
.q-code {
  font-family: "Consolas", "Monaco", "Courier New", monospace;
  font-size: 0.88em; line-height: 1.5; background: #1e1e2e; color: #e0e0e0;
  tab-size: 4; white-space: pre;
}
.q-code:focus { border-color: var(--accent); }

/* ── Partial-credit badge ── */
.badge-partial { background: #fef3c7; color: #92400e; }
.q-card.partial { border-color: #f59e0b; }

/* ── Result after grading ── */
.result {
  display: none; margin-top: 8px; padding: 8px 12px;
  background: #fefcf5; border: 1px solid var(--card-border);
  border-radius: 4px; font-size: 0.9em; line-height: 1.6;
}
.result .badge {
  display: inline-block; padding: 1px 9px; border-radius: 3px;
  font-weight: 700; font-size: 0.82em; margin-right: 6px;
}
.badge-ok  { background: var(--correct-bg); color: #166534; }
.badge-no  { background: var(--wrong-bg); color: #991b1b; }
.badge-ref { background: #dbeafe; color: #1e40af; }

.result .explanation { margin-top: 4px; color: var(--ink); }
.result .pitfall { color: #b45309; margin-top: 3px; font-size: 0.9em; }

/* ── Grading button ── */
.grading-bar { text-align: center; margin: 20px 0; }
.grading-bar button {
  font-size: 1em; padding: 8px 32px; background: var(--accent);
  color: #fff; border: none; border-radius: var(--radius);
  cursor: pointer; font-weight: 600; letter-spacing: 0.3px;
}
.grading-bar button:hover     { background: var(--accent-hover); }
.grading-bar button:disabled  { background: #bbb; cursor: not-allowed; }


.quiz-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  justify-content: center;
  margin: 18px 0;
}
.quiz-toolbar button {
  font-size: 0.95em;
  padding: 8px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--card-border);
  background: #fffdf5;
  cursor: pointer;
}
.quiz-toolbar button.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.quiz-toolbar button.primary:hover {
  background: var(--accent-hover);
}
.quiz-toolbar button:hover {
  background: #f2efe4;
}
.quiz-meta {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin: 18px 0;
}
.meta-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 12px 14px;
}
.meta-card-link {
  display: block;
  color: inherit;
  text-decoration: none;
  transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
}
.meta-card-link:hover {
  transform: translateY(-1px);
  border-color: var(--accent);
  box-shadow: 0 8px 18px rgba(37, 99, 235, 0.08);
}
.meta-card strong {
  display: block;
  font-size: 1.2em;
  margin-bottom: 4px;
}
.focus-module {
  margin: 20px 0;
  padding: 16px;
  border: 1px solid #d8c9a5;
  border-radius: var(--radius);
  background: linear-gradient(135deg, #fff8ea 0%, #fffcf4 100%);
}
.focus-module h2 {
  margin: 0 0 8px;
}
.focus-module p {
  margin: 0;
  color: var(--ink-light);
}
.focus-chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}
.focus-chip {
  padding: 6px 12px;
  border: 1px solid #d6b87d;
  border-radius: 999px;
  background: #fffdf7;
  color: #8a5a00;
  cursor: pointer;
  font-size: 0.9em;
}
.focus-chip.active,
.focus-chip:hover {
  background: #fef3c7;
  border-color: #d97706;
}
.focus-tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
.focus-tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 999px;
  background: #fef3c7;
  color: #92400e;
  font-size: 0.8em;
  font-weight: 700;
}
.focus-topic {
  color: #8a5a00;
  font-size: 0.86em;
  font-weight: 600;
}
.q-card.focus-card {
  border-left: 3px solid #d97706;
  box-shadow: 0 8px 20px rgba(217, 119, 6, 0.08);
}
.card-tools {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.card-tools button {
  font-size: 0.85em;
  padding: 4px 10px;
  border: 1px solid var(--card-border);
  background: #fffdf5;
  border-radius: 999px;
  cursor: pointer;
}
.card-tools button.active {
  background: #fef3c7;
  border-color: #f59e0b;
}
.q-source {
  margin-top: 8px;
  font-size: 0.84em;
  color: var(--ink-light);
}
.q-source summary {
  cursor: pointer;
}
.q-card.hidden {
  display: none;
}
.q-card.missing-reference {
  border-left: 3px solid #d97706;
  background: #fffaf0;
}
.objective-answer {
  margin-top: 4px;
  font-weight: 600;
}
.option-inline {
  display: flex;
  align-items: flex-start;
}
.option-inline input {
  margin-top: 3px;
}
.missing-reference-flag {
  display: inline-block;
  margin-bottom: 8px;
  padding: 2px 8px;
  border-radius: 999px;
  background: #ffedd5;
  color: #9a3412;
  font-size: 0.82em;
  font-weight: 700;
}
.missing-reference-note {
  margin: 16px 0;
  padding: 16px 18px;
  border: 1px solid rgba(143, 59, 46, 0.16);
  border-radius: 16px;
  background: rgba(255, 248, 238, 0.9);
}
.missing-reference-note a {
  font-weight: 600;
}
html {
  scroll-behavior: smooth;
}
#exampass-header,
.header-divider {
  display: none !important;
}
body {
  max-width: none;
  margin: 0;
  padding: 28px 20px 56px;
  background:
    radial-gradient(circle at top left, rgba(200, 111, 91, 0.2), transparent 28%),
    radial-gradient(circle at top right, rgba(36, 93, 111, 0.18), transparent 26%),
    linear-gradient(180deg, #fbf7f1 0%, #f4efe7 56%, #e9dfd1 100%);
}
.page-shell {
  width: min(1320px, 100%);
  margin: 0 auto;
  display: grid;
  gap: 20px;
}
.hero {
  position: relative;
  overflow: hidden;
  padding: 28px;
  border-radius: 28px;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.88), rgba(255, 247, 237, 0.9)),
    rgba(255, 255, 255, 0.75);
  box-shadow: 0 18px 50px rgba(83, 52, 28, 0.12);
  border: 1px solid rgba(255, 255, 255, 0.6);
}
.hero::after {
  content: "";
  position: absolute;
  inset: auto -40px -30px auto;
  width: 220px;
  height: 220px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(200, 111, 91, 0.3), transparent 68%);
  pointer-events: none;
}
.hero-title {
  margin: 10px 0 0;
  font-family: "STZhongsong", "SimSun", "Songti SC", serif;
  font-size: clamp(2rem, 5vw, 3.2rem);
  letter-spacing: 0.04em;
  text-align: left;
  border-bottom: none;
  padding-bottom: 0;
}
.hero-meta {
  margin-top: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  border-radius: 999px;
  background: rgba(143, 59, 46, 0.08);
  color: #8f3b2e;
  font-size: 0.92rem;
}
.layout-two {
  display: grid;
  grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
  gap: 20px;
  align-items: start;
}
.control-stack {
  display: grid;
  gap: 16px;
}
.panel,
.list-card,
.study-question-panel {
  background: rgba(255, 252, 247, 0.94);
  border: 1px solid rgba(255, 255, 255, 0.68);
  box-shadow: 0 18px 50px rgba(83, 52, 28, 0.12);
  border-radius: 20px;
  backdrop-filter: blur(16px);
}
.panel,
.list-card,
.study-question-panel {
  padding: 22px;
}
.section-title {
  margin: 0 0 14px;
  font-size: 1.18rem;
}
.section-caption {
  color: #586574;
  margin: 0 0 12px;
}
.study-shell {
  display: grid;
  gap: 18px;
}
.study-main-grid {
  display: grid;
  grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
  gap: 18px;
  align-items: start;
}
.study-side-panel,
.study-question-panel {
  display: grid;
  gap: 14px;
}
.study-question-panel {
  min-width: 0;
  padding: 22px;
}
.hero-kicker {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(143, 59, 46, 0.08);
  color: #8f3b2e;
  font-size: 0.82em;
  font-weight: 700;
}
.hero-subtitle {
  margin: 12px 0 0;
  color: #586574;
  line-height: 1.7;
}
.hero-metrics {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 20px;
}
.hero-metric {
  min-width: 120px;
  padding: 14px 16px;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.74);
  border: 1px solid rgba(121, 91, 53, 0.14);
}
.hero-metric strong {
  display: block;
  font-size: 1.3rem;
}
.study-toolbar {
  padding: 0;
  border: none;
  border-radius: 0;
  background: transparent;
}
.study-toolbar-title {
  margin: 0 0 10px;
  font-size: 1rem;
  color: #1f2933;
  font-weight: 700;
}
.section-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.section-jump {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid rgba(36, 93, 111, 0.12);
  background: rgba(255, 255, 255, 0.68);
  color: var(--ink);
  text-decoration: none;
  font-size: 0.9em;
}
.section-jump strong {
  font-size: 0.95em;
}
.section-jump.is-empty {
  opacity: 0.45;
}
.section-block {
  display: grid;
  gap: 10px;
}
.section-block > h2 {
  margin-top: 8px;
}
.question-stage {
  display: grid;
  gap: 12px;
}
.question-stage-header {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border: 1px solid var(--card-border);
  border-radius: 14px;
  background: rgba(255, 253, 245, 0.92);
}
.question-stage-title {
  display: grid;
  gap: 4px;
}
.question-stage-title strong {
  font-size: 1.02em;
}
.question-stage-title span {
  color: var(--ink-light);
  font-size: 0.9em;
}
.question-progress {
  min-width: 220px;
  display: grid;
  gap: 8px;
}
.question-progress-meta {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  font-size: 0.88em;
  color: var(--ink-light);
}
.progress-shell {
  width: 100%;
  height: 10px;
  border-radius: 999px;
  background: #efe3c9;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, #d97706 0%, #f59e0b 100%);
}
.question-pager {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 12px 14px;
  border: 1px solid var(--card-border);
  border-radius: 14px;
  background: rgba(255, 253, 245, 0.92);
}
.question-pager-meta {
  color: var(--ink-light);
  font-size: 0.9em;
}
.question-pager-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.question-pager-actions button {
  font-size: 0.92em;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid var(--card-border);
  background: #fffdf5;
  cursor: pointer;
}
.question-pager-actions button:disabled {
  cursor: not-allowed;
  opacity: 0.45;
}
.question-empty {
  padding: 24px 18px;
  border: 1px dashed #dbc8a4;
  border-radius: 14px;
  background: rgba(255, 251, 241, 0.9);
  color: var(--ink-light);
}
.section-jump.is-active {
  background: rgba(143, 59, 46, 0.1);
  border-color: rgba(143, 59, 46, 0.24);
  color: #8f3b2e;
}
.quiz-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  justify-content: flex-start;
  margin: 0;
}
.quiz-toolbar button {
  appearance: none;
  border: 1px solid rgba(36, 93, 111, 0.12);
  border-radius: 999px;
  padding: 11px 18px;
  font: inherit;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.68);
  color: var(--ink);
  transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
}
.quiz-toolbar button:hover {
  transform: translateY(-1px);
}
.quiz-toolbar button.primary {
  background: linear-gradient(135deg, #8f3b2e, #c86f5b);
  color: white;
  box-shadow: 0 10px 22px rgba(143, 59, 46, 0.24);
  border-color: transparent;
}
.quiz-meta {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  margin: 0;
}
.meta-card {
  background: rgba(255, 252, 247, 0.94);
  border: 1px solid rgba(255, 255, 255, 0.68);
  box-shadow: 0 18px 50px rgba(83, 52, 28, 0.12);
  border-radius: 20px;
  padding: 14px 16px;
}
.meta-card strong {
  display: block;
  margin-top: 4px;
  font-size: clamp(1.2rem, 3vw, 1.9rem);
}
.meta-card span {
  color: #586574;
  font-size: 0.88rem;
  line-height: 1.45;
  word-break: break-word;
}
.meta-card-link {
  text-decoration: none;
}
.meta-card-link:hover {
  transform: translateY(-1px);
  box-shadow: 0 20px 52px rgba(83, 52, 28, 0.14);
}
@media (max-width: 768px) {
  body {
    padding: 16px 14px 88px;
  }
  .page-shell {
    gap: 16px;
  }
  .hero,
  .panel,
  .list-card,
  .study-question-panel {
    padding: 18px;
    border-radius: 18px;
    box-shadow: none;
  }
  .layout-two,
  .study-main-grid {
    grid-template-columns: 1fr;
  }
  .quiz-meta {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .study-toolbar,
  .focus-module,
  .q-card {
    box-shadow: none;
  }
  .option {
    padding: 8px 10px;
    transition: border-color 0.08s ease, background-color 0.08s ease;
  }
  #study-actions,
  #wrongbook-actions {
    position: sticky;
    bottom: 8px;
    z-index: 20;
    background: rgba(253, 246, 227, 0.96);
    backdrop-filter: blur(8px);
  }
  #study-actions .quiz-toolbar,
  #wrongbook-actions .quiz-toolbar {
    gap: 8px;
  }

var WRONGBOOK_KEY = 'wrongbook::' + WRONGBOOK_TITLE;
var PAGE_STATE_KEY = 'page-state::' + (window.location.pathname || TITLE || WRONGBOOK_TITLE);
var wrongbook = loadWrongbook();
var pageState = loadPageState();
var filterFavoritesOnly = !!pageState.filterFavoritesOnly;
var filterFocusOnly = !!pageState.filterFocusOnly;
var focusChapterFilter = typeof pageState.focusChapterFilter === 'string' ? pageState.focusChapterFilter : '';
var overviewDrawerOpen = !!pageState.overviewDrawerOpen;
var statsRefreshTimer = 0;
var delegatesAttached = false;
var draftAnswers = pageState.draftAnswers && typeof pageState.draftAnswers === 'object' ? pageState.draftAnswers : {};
var questionResults = pageState.questionResults && typeof pageState.questionResults === 'object' ? pageState.questionResults : {};
var currentQuestionIndex = typeof pageState.currentQuestionIndex === 'number' && isFinite(pageState.currentQuestionIndex)
  ? pageState.currentQuestionIndex
  : 0;

var QUESTION_MAP = {};
for (var qIndex = 0; qIndex < Q.length; qIndex++) {
  QUESTION_MAP[Q[qIndex].id] = Q[qIndex];
}

function escapeHtml(text) {
  return String(text || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function toHtml(text) {
  return escapeHtml(text).replace(/\n/g, '<br>');
}

function loadWrongbook() {
  try {
    var raw = localStorage.getItem(WRONGBOOK_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (err) {
    console.error('load wrongbook failed', err);
    return {};
  }
}

function saveWrongbook() {
  localStorage.setItem(WRONGBOOK_KEY, JSON.stringify(wrongbook));
  scheduleStatsRefresh();
}

function loadPageState() {
  try {
    var raw = localStorage.getItem(PAGE_STATE_KEY);
    if (!raw) {
      return {};
    }
    var parsed = JSON.parse(raw);
    return parsed && typeof parsed === 'object' ? parsed : {};
  } catch (err) {
    console.error('load page state failed', err);
    return {};
  }
}

function savePageState() {
  var state = {
    filterFavoritesOnly: filterFavoritesOnly,
    filterFocusOnly: filterFocusOnly,
    focusChapterFilter: focusChapterFilter,
    overviewDrawerOpen: overviewDrawerOpen,
    draftAnswers: draftAnswers,
    questionResults: questionResults,
    currentQuestionIndex: currentQuestionIndex
  };
  localStorage.setItem(PAGE_STATE_KEY, JSON.stringify(state));
}

function clearPageState() {
  localStorage.removeItem(PAGE_STATE_KEY);
}

function cloneAnswer(answer) {
  return Array.isArray(answer) ? answer.slice() : answer;
}

function isObjectiveType(type) {
  return type === 'choice' || type === 'multi' || type === 'tf' || type === 'fill';
}

function getBaseQuestions() {
  if (PAGE_MODE === 'wrongbook') {
    var wrongQuestions = [];
    for (var i = 0; i < Q.length; i++) {
      if (wrongbook[Q[i].id]) {
        wrongQuestions.push(Q[i]);
      }
    }
    return wrongQuestions;
  }
  return Q.slice();
}

function getActiveQuestions() {
  var questions = getBaseQuestions();
  var filtered = [];
  for (var i = 0; i < questions.length; i++) {
    var question = questions[i];
    var hidden = false;
    if (filterFavoritesOnly && !wrongbook[question.id]) {
      hidden = true;
    }
    if (!hidden && filterFocusOnly && !question.focus_assignment) {
      hidden = true;
    }
    if (!hidden && focusChapterFilter) {
      hidden = !question.focus_assignment || question.focus_assignment.chapter !== focusChapterFilter;
    }
    if (!hidden) {
      filtered.push(question);
    }
  }
  return filtered;
}

function clampCurrentQuestionIndex(activeQuestions) {
  if (!activeQuestions.length) {
    currentQuestionIndex = 0;
    return;
  }
  if (currentQuestionIndex < 0) {
    currentQuestionIndex = 0;
  }
  if (currentQuestionIndex >= activeQuestions.length) {
    currentQuestionIndex = activeQuestions.length - 1;
  }
}

function getCurrentQuestion(activeQuestions) {
  if (!activeQuestions || !activeQuestions.length) {
    return null;
  }
  clampCurrentQuestionIndex(activeQuestions);
  return activeQuestions[currentQuestionIndex];
}

function attachInteractionDelegates() {
  if (delegatesAttached) {
    return;
  }
  var container = document.getElementById('questions-container');
  if (!container) {
    return;
  }

  container.addEventListener('change', function(event) {
    var target = event.target;
    if (!target || !target.matches('input[type="radio"], input[type="checkbox"]')) {
      return;
    }
    var activeQuestions = getActiveQuestions();
    var question = getCurrentQuestion(activeQuestions);
    if (!question) {
      return;
    }
    syncDraftAnswer(question);
    updateCardSelectionState(question.id);
    scheduleStatsRefresh();
  });

  container.addEventListener('input', function(event) {
    var target = event.target;
    if (!target || !target.matches('textarea')) {
      return;
    }
    var activeQuestions = getActiveQuestions();
    var question = getCurrentQuestion(activeQuestions);
    if (!question) {
      return;
    }
    syncDraftAnswer(question);
    scheduleStatsRefresh();
  });

  delegatesAttached = true;
}

function scheduleStatsRefresh() {
  if (statsRefreshTimer) {
    window.clearTimeout(statsRefreshTimer);
  }
  statsRefreshTimer = window.setTimeout(function() {
    statsRefreshTimer = 0;
    refreshStatsNow();
  }, 16);
}

function refreshStatsNow() {
  var activeQuestions = getActiveQuestions();
  refreshWrongbookPanel();
  updateSectionJumpState(activeQuestions);
  updateFocusChips();
  refreshScoreBox(activeQuestions);
}

function updateSectionJumpState(activeQuestions) {
  var visibleTypes = {};
  for (var i = 0; i < activeQuestions.length; i++) {
    visibleTypes[activeQuestions[i].type] = true;
  }
  var currentQuestion = getCurrentQuestion(activeQuestions);
  var jumps = document.querySelectorAll('#section-nav [data-section-jump]');
  for (var j = 0; j < jumps.length; j++) {
    var jump = jumps[j];
    var sectionType = jump.getAttribute('data-section-jump');
    jump.classList.toggle('is-empty', !visibleTypes[sectionType]);
    jump.classList.toggle('is-active', !!currentQuestion && currentQuestion.type === sectionType);
  }
}

function updateFocusChips() {
  var chips = document.querySelectorAll('[data-focus-chip]');
  for (var i = 0; i < chips.length; i++) {
    var chip = chips[i];
    var chapter = chip.getAttribute('data-focus-chip') || '';
    var active = false;
    if (!chapter) {
      active = filterFocusOnly && !focusChapterFilter;
    } else {
      active = focusChapterFilter === chapter;
    }
    chip.classList.toggle('active', active);
  }
}

function renderStageHeader(question, currentNumber, totalQuestions) {
  var currentLabel = SECTION_LABELS[question.type] || question.type || '题目';
  var chapterText = question.focus_assignment
    ? escapeHtml(question.focus_assignment.chapter + ' / ' + question.focus_assignment.topic)
    : '';
  var progress = totalQuestions ? Math.round((currentNumber / totalQuestions) * 100) : 0;
  return ''
    + '<div class="question-stage-header">'
    + '<div class="question-stage-title">'
    + '<strong>' + escapeHtml(currentLabel) + '</strong>'
    + (chapterText ? '<span>' + chapterText + '</span>' : '')
    + '</div>'
    + '<div class="question-progress">'
    + '<div class="question-progress-meta"><span>当前第 ' + currentNumber + ' / ' + totalQuestions + ' 题</span><span>进度 ' + progress + '%</span></div>'
    + '<div class="progress-shell"><div class="progress-bar" style="width:' + progress + '%"></div></div>'
    + '</div>'
    + '</div>';
}

function renderPager(totalQuestions) {
  var currentNumber = totalQuestions ? currentQuestionIndex + 1 : 0;
  var previousDisabled = currentQuestionIndex <= 0 ? ' disabled' : '';
  var nextDisabled = currentQuestionIndex >= totalQuestions - 1 ? ' disabled' : '';
  return ''
    + '<div class="question-pager">'
    + '<div class="question-pager-actions">'
    + '<button type="button" class="primary" onclick="gradeAll()">提交判分</button>'
    + '<button type="button" onclick="goToFirstQuestion()" ' + (currentNumber <= 1 ? 'disabled' : '') + '>回到首题</button>'
    + '<button type="button" onclick="goToPreviousQuestion()"' + previousDisabled + '>上一题</button>'
    + '<button type="button" onclick="goToNextQuestion()"' + nextDisabled + '>下一题</button>'
    + '</div>'
    + '</div>';
}

function renderQuestion(q, currentNumber, totalQuestions) {
  var card = '';
  var classes = ['q-card'];
  if (q.missing_reference) {
    classes.push('missing-reference');
  }
  if (q.focus_assignment) {
    classes.push('focus-card');
  }
  var chapterAttr = q.focus_assignment ? escapeHtml(q.focus_assignment.chapter) : '';
  card += renderStageHeader(q, currentNumber, totalQuestions);
  card += '<h2 id="section-' + q.type + '">' + escapeHtml(SECTION_LABELS[q.type] || q.type) + '</h2>';
  card += '<div class="' + classes.join(' ') + '" id="card-' + q.id + '" data-qid="' + q.id + '" data-focus="' + (q.focus_assignment ? '1' : '0') + '" data-focus-chapter="' + chapterAttr + '">';
  card += '<div class="q-num">' + currentNumber + '. (' + q.points + ' 分)</div>';
  if (q.missing_reference) {
    card += '<div class="missing-reference-flag">无参考答案</div>';
  }
  if (q.focus_assignment) {
    card += '<div class="focus-tag-row">';
    card += '<span class="focus-tag">重点题</span>';
    card += '<span class="focus-topic">' + escapeHtml(q.focus_assignment.chapter + ' / ' + q.focus_assignment.topic) + '</span>';
    card += '</div>';
  }
  card += '<div class="q-text">' + toHtml(q.question) + '</div>';

  if (q.type === 'choice') {
    for (var i = 0; i < q.options.length; i++) {
      card += renderOption(q, i, false);
    }
  } else if (q.type === 'multi') {
    for (var j = 0; j < q.options.length; j++) {
      card += renderOption(q, j, true);
    }
  } else if (q.type === 'tf') {
    var tfOptions = ['对', '错'];
    for (var k = 0; k < tfOptions.length; k++) {
      card += renderTfOption(q, k, tfOptions[k]);
    }
  } else {
    card += '<textarea class="q-textarea" id="text-' + q.id + '" rows="3" placeholder="在此作答..."></textarea>';
  }

  card += '<div class="card-tools">';
  card += '<button type="button" id="fav-' + q.id + '" onclick="toggleFavorite(\'' + q.id + '\')">' + favoriteButtonText(q.id) + '</button>';
  card += '<button type="button" onclick="toggleSources(\'' + q.id + '\')">来源</button>';
  card += '</div>';
  card += renderResultBlock(q);
  card += '<details class="q-source" id="src-' + q.id + '"><summary>查看来源</summary><div>' + toHtml((q.sources || []).join('\n')) + '</div></details>';
  card += '</div>';
  card += renderPager(totalQuestions);
  return card;
}

function renderResultBlock(q) {
  var state = questionResults[q.id];
  var resultClass = 'result';
  var badgeClass = 'badge';
  var badgeText = '';
  var answerText = '';
  var explanationText = toHtml(q.explanation || q.answer_text || '暂无解析');

  if (state) {
    resultClass += ' result-visible';
    if (state.result === 'correct') {
      badgeClass += ' badge-ok';
      badgeText = '正确';
    } else if (state.result === 'wrong') {
      badgeClass += ' badge-no';
      badgeText = '错误';
      answerText = '正确答案：' + escapeHtml(q.answer_text || (q.answers || []).join('、'));
    } else {
      badgeClass += ' badge-ref';
      badgeText = '参考答案';
      answerText = q.answer_text ? '参考答案：' + escapeHtml(q.answer_text) : '开放题，请自行对照来源答案。';
    }
  }

  return ''
    + '<div class="' + resultClass + '" id="result-' + q.id + '"' + (state ? ' style="display:block"' : '') + '>'
    + '<span class="' + badgeClass + '" id="badge-' + q.id + '">' + badgeText + '</span>'
    + '<span class="objective-answer" id="answer-' + q.id + '">' + answerText + '</span>'
    + '<div class="explanation">' + explanationText + '</div>'
    + '</div>';
}

function renderOption(q, optionIndex, isCheckbox) {
  var inputType = isCheckbox ? 'checkbox' : 'radio';
  var optionId = 'opt-' + q.id + '-' + optionIndex;
  var letter = String.fromCharCode(65 + optionIndex);
  return ''
    + '<label class="option" id="' + optionId + '">'
    + '<span class="option-inline">'
    + '<input type="' + inputType + '" name="' + q.id + '" value="' + letter + '">'
    + '<span>' + letter + '. ' + toHtml(q.options[optionIndex]) + '</span>'
    + '</span>'
    + '</label>';
}

function renderTfOption(q, optionIndex, label) {
  var optionId = 'opt-' + q.id + '-' + optionIndex;
  return ''
    + '<label class="option" id="' + optionId + '">'
    + '<span class="option-inline">'
    + '<input type="radio" name="' + q.id + '" value="' + label + '">'
    + '<span>' + escapeHtml(label) + '</span>'
    + '</span>'
    + '</label>';
}

function favoriteButtonText(qid) {
  if (wrongbook[qid]) {
    return PAGE_MODE === 'wrongbook' ? '移出错题本' : '取消收藏';
  }
  return '收藏错题';
}

function toggleFavorite(qid) {
  if (wrongbook[qid]) {
    delete wrongbook[qid];
  } else {
    wrongbook[qid] = snapshotQuestion(qid, 'manual');
  }
  saveWrongbook();
  build();
}

function toggleSources(qid) {
  var details = document.getElementById('src-' + qid);
  if (details) {
    details.open = !details.open;
  }
}

function snapshotQuestion(qid, reason) {
  var question = QUESTION_MAP[qid];
  if (question) {
    return {
      id: qid,
      question: question.question,
      type: question.type,
      reason: reason,
      savedAt: new Date().toISOString()
    };
  }
  return { id: qid, reason: reason, savedAt: new Date().toISOString() };
}

function normalizeText(text) {
  return String(text || '')
    .toLowerCase()
    .replace(/[\s\u00a0]+/g, '')
    .replace(/[，,；;、。．\.：:！!？?（）()【】\[\]“”"']/g, '');
}

function isFillCorrect(userText, answers) {
  var expected = (answers || []).map(normalizeText).filter(Boolean);
  if (!expected.length) {
    return false;
  }
  var normalizedInput = normalizeText(userText);
  if (expected.length === 1) {
    return normalizedInput.indexOf(expected[0]) !== -1;
  }
  var pieces = String(userText || '')
    .split(/[\n,，;；、]/)
    .map(normalizeText)
    .filter(Boolean);
  for (var i = 0; i < expected.length; i++) {
    if (normalizedInput.indexOf(expected[i]) === -1 && pieces.indexOf(expected[i]) === -1) {
      return false;
    }
  }
  return true;
}

function markOptionState(qid, values, answers) {
  var all = document.querySelectorAll('input[name="' + qid + '"]');
  var selectedMap = {};
  for (var i = 0; i < values.length; i++) {
    selectedMap[values[i]] = true;
  }
  var answerMap = {};
  for (var j = 0; j < answers.length; j++) {
    answerMap[answers[j]] = true;
  }
  for (var k = 0; k < all.length; k++) {
    var input = all[k];
    var label = input.closest('.option');
    if (!label) {
      continue;
    }
    label.classList.remove('selected', 'correct-answer', 'wrong-answer');
    if (selectedMap[input.value]) {
      label.classList.add('selected');
    }
    if (answerMap[input.value]) {
      label.classList.add('correct-answer');
    } else if (selectedMap[input.value]) {
      label.classList.add('wrong-answer');
    }
  }
}

function updateCardSelectionState(qid) {
  var card = document.getElementById('card-' + qid);
  if (!card) {
    return;
  }
  var inputs = card.querySelectorAll('input[name="' + qid + '"]');
  for (var i = 0; i < inputs.length; i++) {
    var label = inputs[i].closest('.option');
    if (label) {
      label.classList.toggle('selected', !!inputs[i].checked);
    }
  }
}

function collectAnswerFromCard(question) {
  if (!question) {
    return '';
  }
  if (question.type === 'choice' || question.type === 'tf') {
    var selected = document.querySelector('input[name="' + question.id + '"]:checked');
    return selected ? selected.value : '';
  }
  if (question.type === 'multi') {
    var checked = document.querySelectorAll('input[name="' + question.id + '"]:checked');
    var values = [];
    for (var i = 0; i < checked.length; i++) {
      values.push(checked[i].value);
    }
    values.sort();
    return values;
  }
  var textarea = document.getElementById('text-' + question.id);
  return textarea ? textarea.value : '';
}

function syncDraftAnswer(question) {
  draftAnswers[question.id] = cloneAnswer(collectAnswerFromCard(question));
  savePageState();
}

function restoreAnswerControls(question) {
  var savedAnswer = questionResults[question.id]
    ? questionResults[question.id].userAnswer
    : draftAnswers[question.id];

  if (question.type === 'choice' || question.type === 'tf') {
    var choiceValue = Array.isArray(savedAnswer) ? savedAnswer[0] : savedAnswer;
    var radio = document.querySelector('input[name="' + question.id + '"][value="' + choiceValue + '"]');
    if (radio) {
      radio.checked = true;
    }
  } else if (question.type === 'multi') {
    var selectedValues = Array.isArray(savedAnswer) ? savedAnswer : [];
    for (var i = 0; i < selectedValues.length; i++) {
      var checkbox = document.querySelector('input[name="' + question.id + '"][value="' + selectedValues[i] + '"]');
      if (checkbox) {
        checkbox.checked = true;
      }
    }
  } else {
    var textarea = document.getElementById('text-' + question.id);
    if (textarea && savedAnswer !== undefined && savedAnswer !== null) {
      textarea.value = Array.isArray(savedAnswer) ? savedAnswer.join('；') : savedAnswer;
    }
  }

  updateCardSelectionState(question.id);
}

function setCurrentInputsDisabled(question, disabled) {
  var inputs = document.querySelectorAll('#card-' + question.id + ' input, #card-' + question.id + ' textarea');
  for (var i = 0; i < inputs.length; i++) {
    inputs[i].disabled = !!disabled;
  }
}

function applyResolvedState(question) {
  var state = questionResults[question.id];
  if (!state) {
    setCurrentInputsDisabled(question, false);
    return;
  }
  setCurrentInputsDisabled(question, true);
  if (state.auto && question.type !== 'fill') {
    var expected = (question.answers || []).slice().sort();
    var picked = Array.isArray(state.userAnswer) ? state.userAnswer.slice().sort() : [state.userAnswer].filter(Boolean);
    markOptionState(question.id, picked, expected);
  }
}

function hydrateQuestionCard(question) {
  restoreAnswerControls(question);
  applyResolvedState(question);
}

function refreshWrongbookPanel() {
  var countEl = document.getElementById('wrongbook-count');
  var statEl = document.getElementById('wrongbook-stat-count');
  var ids = [];
  for (var i = 0; i < Q.length; i++) {
    if (wrongbook[Q[i].id]) {
      ids.push(Q[i].id);
    }
  }
  if (countEl) {
    countEl.textContent = String(ids.length);
  }
  if (statEl) {
    statEl.textContent = String(ids.length);
  }
}

function refreshScoreBox(activeQuestions) {
  var scoreBox = document.getElementById('score-box');
  var scoreNum = document.getElementById('score-num');
  var scoreDetail = document.getElementById('score-detail');
  if (!scoreBox || !scoreNum || !scoreDetail) {
    return;
  }

  var totalObjectiveScore = 0;
  var gradedObjectiveCount = 0;
  var objectiveCount = 0;
  var correctCount = 0;
  var currentScore = 0;
  var subjectiveReviewed = 0;

  for (var i = 0; i < activeQuestions.length; i++) {
    var question = activeQuestions[i];
    var result = questionResults[question.id];
    if (isObjectiveType(question.type)) {
      objectiveCount += 1;
      totalObjectiveScore += Number(question.points || 0);
      if (result && result.auto) {
        gradedObjectiveCount += 1;
        currentScore += Number(result.score || 0);
        if (result.result === 'correct') {
          correctCount += 1;
        }
      }
    } else if (result && result.result === 'reference') {
      subjectiveReviewed += 1;
    }
  }

  if (!gradedObjectiveCount && !subjectiveReviewed) {
    scoreBox.style.display = 'none';
    return;
  }

  scoreBox.style.display = 'block';
  scoreNum.textContent = currentScore + ' / ' + totalObjectiveScore;
  scoreDetail.textContent = '当前筛选下自动判分题：' + objectiveCount + '，已判：' + gradedObjectiveCount + '，答对：' + correctCount + '。'
    + (subjectiveReviewed ? ' 已查看参考答案的主观题：' + subjectiveReviewed + '。' : '');
}

function gradeAll() {
  var activeQuestions = getActiveQuestions();
  var question = getCurrentQuestion(activeQuestions);
  if (!question) {
    return;
  }

  var userAnswer = collectAnswerFromCard(question);
  draftAnswers[question.id] = cloneAnswer(userAnswer);
  var resultState = {
    judgedAt: new Date().toISOString(),
    userAnswer: cloneAnswer(userAnswer),
    score: 0,
    maxScore: 0,
    auto: isObjectiveType(question.type),
    result: 'reference'
  };

  if (question.type === 'fill') {
    resultState.maxScore = Number(question.points || 0);
    if (isFillCorrect(userAnswer, question.answers)) {
      resultState.result = 'correct';
      resultState.score = resultState.maxScore;
    } else {
      resultState.result = 'wrong';
      wrongbook[question.id] = snapshotQuestion(question.id, 'auto');
    }
  } else if (question.type === 'choice' || question.type === 'multi' || question.type === 'tf') {
    resultState.maxScore = Number(question.points || 0);
    var picked = Array.isArray(userAnswer) ? userAnswer.slice().sort() : [userAnswer].filter(Boolean);
    var expected = (question.answers || []).slice().sort();
    if (JSON.stringify(picked) === JSON.stringify(expected)) {
      resultState.result = 'correct';
      resultState.score = resultState.maxScore;
    } else {
      resultState.result = 'wrong';
      wrongbook[question.id] = snapshotQuestion(question.id, 'auto');
    }
  } else {
    resultState.auto = false;
    resultState.result = 'reference';
  }

  questionResults[question.id] = resultState;
  saveWrongbook();
  savePageState();
  build();
}


function hasMeaningfulAnswer(answer) {
  if (Array.isArray(answer)) {
    for (var i = 0; i < answer.length; i++) {
      if (hasMeaningfulAnswer(answer[i])) {
        return true;
      }
    }
    return false;
  }
  return answer !== undefined && answer !== null && String(answer).trim() !== '';
}

function isQuestionAnswered(questionId) {
  return !!questionResults[questionId] || hasMeaningfulAnswer(draftAnswers[questionId]);
}

function buildQuestionOverviewGroups(activeQuestions) {
  var groups = [];
  var groupMap = {};
  for (var i = 0; i < activeQuestions.length; i++) {
    var question = activeQuestions[i];
    var type = question.type || 'other';
    if (!groupMap[type]) {
      groupMap[type] = {
        type: type,
        label: SECTION_LABELS[type] || type,
        items: []
      };
      groups.push(groupMap[type]);
    }
    groupMap[type].items.push({
      id: question.id,
      index: i,
      number: i + 1
    });
  }
  return groups;
}

function renderOverviewLegend() {
  return ''
    + '<div class="overview-legend">'
    + '<span class="overview-legend-item"><span class="overview-swatch is-current"></span><span>当前题目</span></span>'
    + '<span class="overview-legend-item"><span class="overview-swatch is-answered"></span><span>已作答</span></span>'
    + '<span class="overview-legend-item"><span class="overview-swatch is-unanswered"></span><span>未作答</span></span>'
    + '</div>';
}

function renderQuestionOverview(activeQuestions) {
  var shell = document.getElementById('question-overview-shell');
  var panel = document.getElementById('question-overview-panel');
  var toggle = document.getElementById('overview-mobile-toggle');
  if (!shell || !panel || !toggle) {
    return;
  }

  var drawerOpen = overviewDrawerOpen || window.innerWidth > 768;
  shell.classList.toggle('is-open', drawerOpen);
  toggle.setAttribute('aria-expanded', drawerOpen ? 'true' : 'false');
  toggle.textContent = activeQuestions.length
    ? '题目概览 ' + (currentQuestionIndex + 1) + '/' + activeQuestions.length
    : '题目概览';

  if (!activeQuestions.length) {
    panel.innerHTML = ''
      + '<div class="overview-header">'
      + '<div><h2 class="section-title">题目概览</h2><div class="section-caption">按题号快速跳转当前题集。</div></div>'
      + renderOverviewLegend()
      + '</div>'
      + '<div class="question-overview-empty">当前筛选下暂无题目。</div>';
    return;
  }

  var groups = buildQuestionOverviewGroups(activeQuestions);
  var html = ''
    + '<div class="overview-header">'
    + '<div><h2 class="section-title">题目概览</h2><div class="section-caption">按题号快速跳转当前题集。</div></div>'
    + renderOverviewLegend()
    + '</div>'
    + '<div class="overview-sections">';

  for (var groupIndex = 0; groupIndex < groups.length; groupIndex++) {
    var group = groups[groupIndex];
    html += '<section class="overview-section">';
    html += '<h3 class="overview-section-title">' + escapeHtml(group.label) + '</h3>';
    html += '<div class="overview-grid">';
    for (var itemIndex = 0; itemIndex < group.items.length; itemIndex++) {
      var item = group.items[itemIndex];
      var stateClass = item.index === currentQuestionIndex
        ? 'is-current'
        : (isQuestionAnswered(item.id) ? 'is-answered' : 'is-unanswered');
      html += '<button type="button" class="overview-button ' + stateClass + '" onclick="return jumpToQuestion(' + item.index + ')">' + item.number + '</button>';
    }
    html += '</div>';
    html += '</section>';
  }

  html += '</div>';
  panel.innerHTML = html;
}

function jumpToQuestion(index) {
  var activeQuestions = getActiveQuestions();
  if (index < 0 || index >= activeQuestions.length) {
    return false;
  }
  currentQuestionIndex = index;
  if (window.innerWidth <= 768) {
    overviewDrawerOpen = false;
  }
  savePageState();
  build();
  return false;
}

function toggleOverviewDrawer(forceOpen) {
  overviewDrawerOpen = typeof forceOpen === 'boolean' ? forceOpen : !overviewDrawerOpen;
  savePageState();
  renderQuestionOverview(getActiveQuestions());
  return false;
}

function build() {
  var container = document.getElementById('questions-container');
  if (!container) {
    return;
  }

  var activeQuestions = getActiveQuestions();
  clampCurrentQuestionIndex(activeQuestions);
  savePageState();
  var currentQuestion = getCurrentQuestion(activeQuestions);

  if (!activeQuestions.length) {
    var emptyText = PAGE_MODE === 'wrongbook'
      ? '当前错题本为空。返回总题页做题后，自动判错或手动收藏的题目会出现在这里。'
      : '当前筛选下没有题目，请切换筛选条件后继续。';
    container.innerHTML = '<div class="question-empty">' + emptyText + '</div>';
    attachInteractionDelegates();
    refreshStatsNow();
    renderQuestionOverview(activeQuestions);
    return;
  }

  container.innerHTML = '<div class="question-stage">' + renderQuestion(currentQuestion, currentQuestionIndex + 1, activeQuestions.length) + '</div>';
  attachInteractionDelegates();
  hydrateQuestionCard(currentQuestion);
  refreshStatsNow();
  renderQuestionOverview(activeQuestions);
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([container]).catch(function(err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

function jumpToSection(sectionType) {
  var activeQuestions = getActiveQuestions();
  for (var i = 0; i < activeQuestions.length; i++) {
    if (activeQuestions[i].type === sectionType) {
      currentQuestionIndex = i;
      build();
      return false;
    }
  }
  return false;
}

function goToPreviousQuestion() {
  var activeQuestions = getActiveQuestions();
  if (!activeQuestions.length) {
    return;
  }
  currentQuestionIndex = Math.max(0, currentQuestionIndex - 1);
  build();
}

function goToNextQuestion() {
  var activeQuestions = getActiveQuestions();
  if (!activeQuestions.length) {
    return;
  }
  currentQuestionIndex = Math.min(activeQuestions.length - 1, currentQuestionIndex + 1);
  build();
}

function goToFirstQuestion() {
  currentQuestionIndex = 0;
  build();
}

function applyQuestionFilters() {
  currentQuestionIndex = 0;
  build();
}

function showFavoritesOnly() {
  filterFavoritesOnly = true;
  filterFocusOnly = false;
  focusChapterFilter = '';
  applyQuestionFilters();
}

function showFocusOnly() {
  filterFavoritesOnly = false;
  filterFocusOnly = true;
  focusChapterFilter = '';
  applyQuestionFilters();
}

function showFocusChapter(chapter) {
  filterFavoritesOnly = false;
  filterFocusOnly = false;
  focusChapterFilter = chapter;
  applyQuestionFilters();
}

function showAllQuestions() {
  filterFavoritesOnly = false;
  filterFocusOnly = false;
  focusChapterFilter = '';
  applyQuestionFilters();
}

function clearWrongbook() {
  wrongbook = {};
  saveWrongbook();
  currentQuestionIndex = 0;
  build();
}

function resetPageState() {
  questionResults = {};
  draftAnswers = {};
  filterFavoritesOnly = false;
  filterFocusOnly = false;
  focusChapterFilter = '';
  overviewDrawerOpen = false;
  currentQuestionIndex = 0;
  clearPageState();
  window.location.reload();
}

document.addEventListener('DOMContentLoaded', build);
if (document.readyState === 'interactive' || document.readyState === 'complete') {
  build();
}

</script>
</body>
</html>

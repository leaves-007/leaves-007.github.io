<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCASAI 智能学习工具共建资料导航</title>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --muted: #64748b; }
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        header { max-width: 1200px; margin: 0 auto 30px; text-align: center; }
        header h1 { color: var(--primary); margin-bottom: 8px; }
        
        /* AI 推荐面板 */
        .ai-section { max-width: 1200px; margin: 0 auto 30px; background: #fff; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .ai-config { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .ai-config input, .ai-config select { flex: 1; min-width: 200px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.85rem; background: #fff; }
        .chat-row { display: flex; gap: 10px; }
        .chat-row input { flex: 1; padding: 10px; border: 1px solid var(--accent); border-radius: 6px; }
        .btn-ai { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; white-space: nowrap;}
        .ai-out { margin-top: 15px; padding: 12px; background: #f1f5f9; border-radius: 6px; font-size: 0.9rem; border-left: 4px solid var(--accent); min-height: 40px; white-space: pre-wrap; }
        .cache-tip { font-size: 0.75rem; color: #10b981; margin-top: 5px; display: none; }

        /* 搜索与筛选 */
        .search-row { max-width: 1200px; margin: 0 auto 20px; }
        .search-bar { width: 100%; padding: 12px 20px; border: 2px solid #e2e8f0; border-radius: 30px; font-size: 1rem; }
        .filters { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 30px; }
        .filter-btn { padding: 6px 14px; border: 1px solid #cbd5e1; border-radius: 20px; background: #fff; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* 卡片网格 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; transition: 0.2s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card-cat { font-size: 0.7rem; color: var(--accent); font-weight: bold; margin-bottom: 5px; }
        .card-title { font-size: 1.1rem; margin: 0 0 10px 0; color: var(--primary); }
        .card-desc { font-size: 0.85rem; color: var(--muted); margin-bottom: 15px; flex-grow: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .card-btns { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 8px; border-radius: 6px; text-align: center; text-decoration: none; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
        .btn-main { background: var(--accent); color: #fff; border: none; }
        .btn-detail { background: #f1f5f9; color: var(--primary); border: 1px solid #e2e8f0; }

        /* 模态框 (详情) */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; padding:20px; }
        .modal-box { background:#fff; border-radius:16px; width:100%; max-width:800px; max-height:85vh; overflow-y:auto; padding:30px; position:relative; }
        .close { position:absolute; top:20px; right:20px; font-size:1.5rem; cursor:pointer; border:none; background:none; }
        .m-section { margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0;}
        .m-label { font-weight: bold; color: var(--primary); display: block; border-left: 4px solid var(--accent); padding-left: 8px; margin-bottom: 8px; font-size: 1.05rem;}
        .m-text { font-size: 0.95rem; color: #334155; line-height: 1.7; white-space: pre-wrap; }

        footer { text-align: center; margin-top: 50px; padding: 20px; color: var(--muted); font-size: 0.85rem; border-top: 1px solid #e2e8f0; }
    </style>
</head>

<header>

        </select>
    </div>

</div>

<div class="search-row">

</div>
<div class="filters" id="filterBar"></div>
<div class="grid" id="grid"></div>

<div class="modal" id="modal">

        <div class="m-section"><span class="m-label">核心亮点 (它最让你惊喜的能力?)</span><div class="m-text" id="m-hl"></div></div>

        <div class="m-section"><span class="m-label">适合场景 (在什么情况下用它?解决了什么痛点?)</span><div class="m-text" id="m-sc"></div></div>
        <a id="m-link" href="#" target="_blank" class="btn btn-main" style="display:block; padding: 12px; font-size: 1rem; margin-top: 20px;">访问官方链接</a>
    </div>
</div>

<footer>
    index作者：leaves
<p>参考内容为中国科学院大学人工智能学院提供的《智能学习共建手册（2026年4月版）》</p>
</footer>

          steps: "1.在网页版直接用自然语言提问\n2.找到的论文能够用Filter 筛选(如:筛选高引用文献,论文年限、指定“2DGS”领域等)",

        { name: "notebookllm + gamma", cat: "创意表达", url: "#",

        { name: "Codex (OpenAI)", cat: "编程开发", url: "https://openai.com/codex/", 
          intro: "OpenAI 推出的软件工程Agent,可以在独立环境中帮助完成写代码、修Bug、分析仓库和处理工程任务。", 
          highlight: "它不是只给建议,而是能在云端独立任务环境里实际处理开发任务,适合把功能开发、复杂重构和问题排查整块交给它。", 
          steps: "1. 打开支持 Codex 的工作区;2.连接代码仓库或导入项目;3.直接输入任务,例如“给这个仓库增加登录模块”或“分析为什么测试失败”;4.查看它生成的修改结果并决定是否采纳。", 
          scenarios: "适合功能迭代、复杂重构、批量 Issue 处理、远程并行完成工程任务,解决“任务太碎、开发流程太长、单人处理效率低”的问题。" },

        { name: "Julius Al", cat: "数据分析", url: "https://julius.ai/", 
          intro: "一个能直接和表格、数据对话的AI 分析工具。", 
          highlight: "它很适合让不会写太多代码的人,也能先把图、结论和异常点跑出来,而这种优势通常就体现在,上传表格后就能画图、解释和做初步预测。", 
          steps: "先上传 CSV或Excel,再用完整问题来问,比如“按月份看趋势并找异常点”;图出来后别急着信,先抽几条数据手动核对。", 
          scenarios: "适合课程数据分析、竞赛初探、实验结果快读,尤其适合“有数据但不知道先问什么”的时候。" },

        { name: "Obsidian", cat: "知识管理", url: "https://obsidian.md", 
          intro: "基于Markdown 的笔记/记忆管理工具", 
          highlight: "1. AI友好:官方提供CLI指令、API接口、Skill 能够结合AI使用,Markdown格式数据也方便AI阅读,实现AI自动化笔记创建、记录和整理\n2.数据迁移方便:数据为markdown 语法的文本文件,直接拷贝走或上传 github 等即可\n3.关系图谱:根据笔记间的链接自动生成网状知识图谱,可以直观的看到各新旧笔记间的相互关联性\n4. 社区插件丰富:思维导图、自动同步、看板等多种插件,也可自定义插件(让AI写也可以)", 
          steps: "1. 安装 Obsidian\n2. 新建知识库(文件夹)\n3.新建/导入笔记或同步\n4. 接入AI", 
          scenarios: "笔记本、知识库管理" },

        { name: "daily-paper-reader", cat: "学术研究", url: "https://github.com/ziwenhahaha/daily-paper-reader", 
          intro: "一个能每天自动抓新论文、顺手还能做问答和阅读面板的开源工具。", 
          highlight: "支持 GitHub Actions 自动更新 GitHub Pages 部署与论文问答。它把“找新论文、存下来、继续追问”串成了一条线,个人用很省心,实验室一起用也很顺。", 
          steps: "按仓库 README的常见流程,先准备个大模型 API Key和GitHub PAT;再Fork仓库、开启 GitHub Actions 和GitHub Pages;站点跑起来后,就能在网页端继续配关键词、研究方向和阅读偏好。", 
          scenarios: "适合长期追 arXiv / OpenReview 新论文的人,尤其适合做个人论文雷达、实验室公共论文主页,或者想把“发现———阅读————提问”放到一个入口里的人。" },

        { name: "Poe", cat: "通用模型", url: "https://poe.com/", 
          intro: "一个把多个大模型放在同一入口里的AI 对话平台。", 
          highlight: "最实用的点是,一个入口就能切换多家模型,做横向对比很方便。同一个问题换几个模型一看,哪个更稳、哪个更会写,一下就能分出来。", 
          steps: "更实用的用法不是一直换模型,而是先橫向对比第一轮回答,再挑一个继续深入改稿或补思路。", 
          scenarios: "适合你不知道该用哪家模型、想先少走弯路的时候。" },

        { name: "Kimi Code", cat: "编程开发", url: "https://www.kimi.com/code/zh", 
          intro: "月之暗面推出的代码Agent,能够在命令行环境中协助完成写代码、改代码、分析项目和自动化开发任务。", 
          highlight: "亮点在于它既能理解代码,又能直接执行 Shell命令,搜索项目、分析文件,甚至可以协助做一些半自动化的软件开发流程。", 
          steps: "1. 安装 Kimi Code; 2.在终端进入项目目录;3.用自然语言下达任务,如“分析这个仓库结构并告诉我入口文件在哪”;4.根据返回结果继续追问或让它直接修改。", 
          scenarios: "适合代码库速读、脚本自动化、命令行协作开发、项目结构分析,解决“新人接手项目成本高、命令行操作繁琐”的问题。" },

        { name: "Gemini CLI / Code Assist", cat: "编程开发", url: "https://developers.google.com/gemini-code-assist", 
          intro: "Google 推出的编程助手,可在终端或编辑器中协助开发者完成代码生成、调试、解释和工程分析任务。", 
          highlight: "它的优势是能把代码生成、终端操作、资料搜索和工程理解结合在一起,用一个入口处理“写代码+查资料+调试”这整条链路。", 
          steps: "1. 安装 Gemini CLI或在编辑器中启用Gemini Code Assist; 2.打开项目目录;3.输入任务,如“为这个接口写测试并解释调用逻辑”;4.按需让它继续修改、解释或调试。", 
          scenarios: "适合终端工作流、查错调试、补测试、需要一边开发一边查文档的场景,解决“写代码和查资料来回切换”的问题。" },

        { name: "Cursor Agent", cat: "编程开发", url: "https://www.cursor.com/", 
          intro: "集成在AI 编辑器Cursor 中的编程代理,能够在写代码过程中持续参与修改、补全、重构和调试。", 
          highlight: "和编辑器深度结合,能边看代码边直接改多个文件,使用体验很顺,特别适合日常持续开发。", 
          steps: "1. 安装 Cursor 并打开项目;2.在Agent面板中输入需求;3.例如输入“重构这一模块并补充必要注释”;4.查看它对项目的修改并继续交互式调整。", 
          scenarios: "适合前后端日常开发、旧项目连续迭代、报错修复、局部功能改造,解决“编辑器里改代码效率低、跨文件修改不方便”的问题。" },

        { name: "Windsurf/Cascade", cat: "编程开发", url: "https://windsurf.com/", 
          intro: "Windsurf 是一款 Al IDE,内置 Cascade 代码代理,能帮助开发者从生成代码到调试修改完成一体化开发。", 
          highlight: "上下文感知比较强,能够结合终端、项目文件、页面预览等一起协同工作,尤其适合前端和原型开发。", 
          steps: "1. 安装 Windsurf;2.打开项目或新建工程;3.在Cascade面板中直接说需求,如“帮我做一个登录页并接上假数据接口”;4.再让它继续调样式、修报错或补功能。", 
          scenarios: "适合前端页面开发、原型设计,小型全栈项目和边预览边修改的任务,解决“从想法到可运行页面中间步骤太多”的问题。" },

        { name: "Cline", cat: "编程开发", url: "https://cline.bot/", 
          intro: "一个开源的编程代理工具,可以接入不同大模型,在编辑器中帮助用户修改代码、执行任务和管理开发流程。\n或者：一个能在本地编辑器或终端里陪你改代码的AI助手。", 
          highlight: "开源、透明、可控,很多关键操作都能由用户确认,适合重视自主控制和模型自由选择的使用者。\n好用的地方是,可操作文件和终端,适合多步开发任务。你不用离开当前开发环境,边看代码边下指令就行。", 
          steps: "1. 安装 Cline 插件或CLI; 2. 配置所需模型接口;3.打开项目后输入任务,例如“帮我定位性能瓶颈并提出修改方案”;4.按步骤确认它的操作。\n先把要改的文件范围说清楚,必要时手动加进上下文;先让它提出改法,再让它执行;每次改完就跑一下测试,至少把关键路径点一遍。", 
          scenarios: "适合开源爱好者、想自己接模型的人、需要高可控代码修改流程的团队,解决“商业工具黑盒感强、模型选择受限”的问题。\n适合你已经在本地开工了,只想少切网页,少复制粘贴的时候。" },

        { name: "ChatGPT (通用)", cat: "通用模型", url: "https://chatgpt.com/", 
          intro: "一个拿来就能用的通用型AI工具,适合把零散任务先拉到同一个对话里处理。", 
          highlight: "真正好用的点在于,文本、图片、文件、代码都能处理,通用性极强。很多时候不是不会做,而是不知道从哪一步开始,它能先替你把路铺出来。读长 PDF 和代码库很省时间。面对几十页材料时,它能先把结构理顺,你再决定哪些段落值得精读。", 
          steps: "先别一上来就问得很空,第一句把任务、对象和输出格式说清楚;有讲义、截图、PDF就一起上传;第一版出来后只改一个点,比如“压到300字”“改成答辩口语”。", 
          scenarios: "用在日常学习特别顺手:查概念、改文案补代码、整理资料,都能先让它打个底。" },

        { name: "Claude (长文)", cat: "通用模型", url: "https://claude.ai/", 
          intro: "一个更擅长吃长文档、长论文和长代码的AI助手。", 
          highlight: "读长 PDF 和代码库很省时间。面对几十页材料时,它能先把结构理顺,你再决定哪些段落值得精读。(注:原表有部分合并,以此为准)", 
          steps: "读长论文时,先问“这篇到底想解决什么问题”,再问“方法怎么做、实验怎么验证”;如果是代码库,就先让它讲项目结构,再让它解释关键文件。", 
          scenarios: "适合老师一次扔给你一大包PDF、你又没时间从头细啃的时候。" },

        { name: "Gemini", cat: "通用模型", url: "https://gemini.google.com/", 
          intro: "一个偏“万金油”路线的AI助手,平时学习、写作和小开发基本都能派上用场。", 
          highlight: "最省时间的地方是,联网与Google 生态协同强,适合资料整理。你不用先把问题想得特别标准,先把材料扔进去,它通常就能帮你把第一版搭起来。", 
          steps: "比较稳的用法是先让它给提纲,再让它按提纲展开,最后单独细改最重要的两三处。这样比一句“帮我写完”更容易得到能直接用的结果。", 
          scenarios: "用在日常学习特别顺手:查概念、改文案补代码、整理资料,都能先让它打个底。" },

        { name: "DeepSeek (中文)", cat: "通用模型", url: "https://chatdeepseek.com/", 
          intro: "一个偏“万金油”路线的AI助手,平时学习、写作和小开发基本都能派上用场。", 
          highlight: "中文问答、推理和代码生成表现稳定。它很适合把“脑子里有个模糊想法”慢慢磨成“手里有个像样成品”。",

        { name: "Kimi (长文)", cat: "通用模型", url: "https://www.kimi.com/", 
          intro: "一个适合拿来啃大段材料的AI工具,面对几十页内容也不容易一下子乱掉。",

          steps: "先把整份材料上传,不要只截一小段;第一轮先让它按章节或模块总结;第二轮指定某一节“用大白话解释”;第三轮再让它整理成汇报提纲或复习卡片。", 
          scenarios: "特别适合做长论文阅读、组会准备和接手旧代码库这种一上来信息量就很大的活。" },

        { name: "豆包 (字节)", cat: "通用模型", url: "https://www.doubao.com/", 
          intro: "一个偏“万金油”路线的AI助手,平时学习,写作和小开发基本都能派上用场。",

          steps: "先别一上来就问得很空,第一句把任务、对象和输出格式说清楚;有讲义、截图、PDF就一起上传;第一版出来后只改一个点,比如“压到300字”“改成答辩口语”。",

        { name: "Qwen Chat (通义千问)", cat: "通用模型", url: "https://qwen.ai/", 
          intro: "一个拿来就能用的通用型AI工具,适合把零散任务先拉到同一个对话里处理。", 
          highlight: "文档处理、图像理解和网页搜索能力较全面。它很适合把“脑子里有个模糊想法”慢慢磨成“手里有个像样成品”。", 
          steps: "常见用法是三步:先交代背景和截止时间,再把原文,代码或资料贴进去,最后让它按你要的格式重写。别只说“再优化”,直接点名“删废话、保留结论、分点输出”。", 
          scenarios: "最适合那种“我大概知道要做什么,但还没理清顺序”的场景。它能先帮你把问题拆开,不至于一直卡在开头。" },

        { name: "文心一言", cat: "通用模型", url: "https://yiyan.baidu.com/",

          steps: "先别一上来就问得很空,第一句把任务、对象和输出格式说清楚;有讲义、截图、PDF就一起上传;第一版出来后只改一个点,比如“压到300字”“改成答辩口语”。",

        { name: "Perplexity", cat: "通用模型", url: "https://www.perplexity.ai/", 
          intro: "一个更像“会先找资料、再给你答案”的AI搜索工具。", 
          highlight: "它舒服的地方在于,适合先看结论再回溯出处,做调研很省时间。你不用自己先开十几个网页再拼答案,能先拿到一个带来路的总结版。", 
          steps: "比较稳的问法是“先给结论,再给依据,再给反例”。这样拿到的结果既能快速看懂,也方便你回头自己核来源。", 
          scenarios: "特别适合做选题摸底、行业调研和课前补背景,不然很容易半小时过去还停在搜第一轮链接。" },

        { name: "Microsoft Copilot", cat: "通用模型", url: "https://copilot.microsoft.com", 
          intro: "一个把搜索、问答和办公场景拧在一起的AI助手。", 
          highlight: "最省事的地方是,搜索、问答和办公协作衔接自然。查完信息后,顺手就能继续让它改成邮件、表格说明或汇报提纲,不用再换工具。", 
          steps: "先问它要点和结论,再让它顺手改成你要交的格式,比如“整理成表格”“改成周报口吻”“写成一封能直接发的邮件”。", 
          scenarios: "适合一边查资料、一边还得把内容整理成办公成品的时候,比如做周报、汇总材料、写说明文档。" },

        { name: "Elicit (简版)", cat: "学术研究", url: "https://elicit.com/", 
          intro: "一个围绕研究问题找论文、抽要点的科研助手", 
          highlight: "能检索论文并抽取关键信息,适合开题前摸底。尤其在刚进新方向时,它能帮你先把文献池和对比框架搭起来。", 
          steps: "比较稳的流程是:先问“这个问题大家怎么做”,再问“常见数据集和指标是什么”,最后再自己挑最关键的几篇精读。", 
          scenarios: "特别适合老师甩给你一个研究题目,但你还没形成自己的阅读入口时。" },

        { name: "Consensus (简版)", cat: "学术研究", url: "https://consensus.app/", 
          intro: "一个围绕研究问题找论文、抽要点的科研助手", 
          highlight: "更偏证据回答,适合验证某个结论是否有研究支持。尤其在刚进新方向时,它能帮你先把文献池和对比框架搭起来。", 
          steps: "比较稳的流程是:先问“这个问题大家怎么做”,再问“常见数据集和指标是什么”,最后再自己挑最关键的几篇精读。", 
          scenarios: "特别适合老师甩给你一个研究题目,但你还没形成自己的阅读入口时。" },

        { name: "Scite", cat: "学术研究", url: "https://scite.ai/", 
          intro: "一个能告诉你“这篇论文后来是被支持还是被质疑”的引用分析工具。", 
          highlight: "能看论文是被支持、反驳还是仅被提及,避免误引。这能避免你把一篇“很有名的论文”误当成“已经盖棺定论的结论”。", 
          steps: "先搜核心论文,再点进引用上下文看别人是怎么提到它的;如果是关键结论,顺手把支持和质疑的后续文献都记下来。", 
          scenarios: "适合写综述、做答辩,尤其是你怕把文献结论说得太满的时候。" },

        { name: "Semantic Scholar", cat: "学术研究", url: "https://www.semanticscholar.org/", 
          intro: "一个更适合学术场景的论文搜索工具。", 
          highlight: "它好用在,TLDR 与相似论文推荐很好用,适合入门新方向。先帮你快筛一轮,再决定哪些真的值得花时间精读。", 
          steps: "先搜主题或标题,看TLDR 和相似论文;挑几篇最像的当种子,再顺着参考文献和相关论文往外扩。", 
          scenarios: "适合你刚接触一个方向,想先把“这圈人在聊什么”摸清楚。" },

        { name: "Connected Papers", cat: "学术研究", url: "https://www.connectedpapers.com/", 
          intro: "一个把论文关系画成图的文献脉络工具。", 
          highlight: "最直观的好处是,一张图看清某篇论文周围的经典文献和后续工作。看图比看一长串检索结果更容易知道谁是前作、谁是后续", 
          steps: "先找一篇种子论文扔进去,看它周围最密的那一圈;先抓经典文,再补近两年的跟进工作,最后再回去读原文。", 
          scenarios: "适合你知道一两篇代表作,但还不知道整个领域怎么串起来的时候。" },

        { name: "Research Rabbit", cat: "学术研究", url: "https://www.researchrabbit.ai/", 
          intro: "一个更偏“持续追新”的论文雷达工具。", 
          highlight: "它厉害的不是一次帮你找到多少,而是,像文献推荐流一样持续发现相关论文。长期盯一个方向时,比每周重新搜一遍省力得多。",

          scenarios: "适合长期盯一个方向的人,比如做毕业设计、跟实验室课题、或者准备长期竞赛项目。" },

        { name: "Litmaps", cat: "学术研究", url: "https://www.litmaps.com/",

        { name: "Scholarcy", cat: "学术研究", url: "https://www.scholarcy.com/",

        { name: "Heptabase", cat: "知识管理", url: "https://heptabase.com/",

        { name: "GitHub Copilot (简版)", cat: "编程开发", url: "https://github.com/features/copilot",

        { name: "Aider", cat: "编程开发", url: "https://aider.chat/",

        { name: "OpenHands", cat: "编程开发", url: "https://openhands.dev/",

        { name: "OpenClaw (小龙虾 简版)", cat: "自动化", url: "https://openclaw.ai/",

        { name: "Dify", cat: "Agent框架", url: "https://dify.ai/",

        { name: "扣子 Coze", cat: "Agent框架", url: "https://www.coze.cn/",

    const grid = document.getElementById('grid');
    const filterBar = document.getElementById('filterBar');
    const search = document.getElementById('search');
    const cats = ['全部', ...new Set(tools.map(t => t.cat))];

    // 初始化 API 缓存
    window.onload = () => {
        const savedKey = localStorage.getItem('ucas_api_key');
        const savedUrl = localStorage.getItem('ucas_api_url');
        const savedModel = localStorage.getItem('ucas_model_name');
        let hasCache = false;
        
        if(savedKey) { document.getElementById('apiKey').value = savedKey; hasCache = true; }
        if(savedUrl) { document.getElementById('apiUrl').value = savedUrl; hasCache = true; }
        if(savedModel) { document.getElementById('modelName').value = savedModel; hasCache = true; }
        
        if(hasCache) {
            const tip = document.getElementById('cacheTip');
            tip.style.display = 'block';
            setTimeout(() => tip.style.display = 'none', 3000);
        }
    };

    function render(f = '全部', q = '') {
        grid.innerHTML = '';
        const filtered = tools.filter(t => 
            (f === '全部' || t.cat === f) && 
            (t.name.toLowerCase().includes(q.toLowerCase()) || 
             t.intro.toLowerCase().includes(q.toLowerCase()) ||
             t.scenarios.toLowerCase().includes(q.toLowerCase()))
        );
        filtered.forEach(t => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<div class="card-cat">${t.cat}</div><h3 class="card-title">${t.name}</h3><div class="card-desc">${t.intro}</div><div class="card-btns"><button class="btn btn-detail" onclick="show('${t.name}')">详细内容</button><a href="${t.url}" target="_blank" class="btn btn-main">直接进入</a></div>`;
            grid.appendChild(div);
        });
    }

    cats.forEach(c => {
        const b = document.createElement('button');
        b.className = 'filter-btn' + (c === '全部' ? ' active' : '');
        b.innerText = c;
        b.onclick = () => { document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); render(c, search.value); };
        filterBar.appendChild(b);
    });

    search.oninput = (e) => render(document.querySelector('.filter-btn.active').innerText, e.target.value);

    function show(n) {
        const t = tools.find(x => x.name === n);
        document.getElementById('m-title').innerText = t.name;
        document.getElementById('m-intro').innerText = t.intro;
        document.getElementById('m-hl').innerText = t.highlight;
        document.getElementById('m-steps').innerText = t.steps;
        document.getElementById('m-sc').innerText = t.scenarios;
        document.getElementById('m-link').href = t.url;
        document.getElementById('modal').style.display = 'flex';
    }

    document.getElementById('close').onclick = () => document.getElementById('modal').style.display = 'none';
    window.onclick = (e) => { if(e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };

    async function callAI() {
        const url = document.getElementById('apiUrl').value;
        const key = document.getElementById('apiKey').value;
        const model = document.getElementById('modelName').value;
        const q = document.getElementById('chatInput').value;
        const out = document.getElementById('aiOut');
        const btn = document.getElementById('aiBtn');

        if(!key || !q) { out.innerText = "错误：请提供 API Key 和详细的需求描述。"; return; }
        
        // 保存缓存
        localStorage.setItem('ucas_api_url', url);
        localStorage.setItem('ucas_api_key', key);
        localStorage.setItem('ucas_model_name', model);

        btn.innerText = "请求中...";
        btn.disabled = true;
        out.innerText = "正在分析全库工具并匹配最佳方案...";
        
        try {
            const r = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({ 
                    model: model, 
                    messages: [
                        { role: "system", content: "你是一个冷静的工具导航专家。库中包含: " + tools.map(t=>t.name + " (" + t.scenarios + ")").join("; ") + "。请基于用户的需求，从库中推荐1-2个具体工具并依据其适合场景给出专业理由。禁止废话。" }, 
                        { role: "user", content: q }
                    ] 
                })
            });
            const d = await r.json();
            if(d.error) throw new Error(d.error.message || "未知接口错误");
            out.innerText = d.choices ? d.choices[0].message.content : "接口调用异常，请确认Key和Endpoint配置。";
        } catch(e) { out.innerText = "调用失败: " + e.message; }
        finally { btn.innerText = "获取匹配建议"; btn.disabled = false; }
    }

    render();
</script>
</body>
</html>
